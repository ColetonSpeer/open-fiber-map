            <label><input type="radio" name="pt-type" value="skip"> Skip</label>
          </div>
        </div>` : ''}

        ${lines.length ? `
        <div style="margin-bottom:12px">
          <strong>📏 ${lines.length} line${lines.length !== 1 ? 's' : ''}</strong> — import as:
          <div class="import-assign-row">
            <label><input type="radio" name="ln-type" value="route" checked> Fiber Routes</label>
            <label><input type="radio" name="ln-type" value="skip"> Skip</label>
          </div>
          <div style="display:flex;gap:14px;margin-top:6px;font-size:12px;align-items:center">
            Default fibers: <input type="number" id="imp-fcount" value="12" min="1" max="9999" style="width:60px;padding:3px 6px;border:1px solid #ccc;border-radius:4px">
            Color: <input type="color" id="imp-color" value="#FF8800" style="width:36px;height:24px;border:none;cursor:pointer">
          </div>
          <div style="display:flex;gap:6px;margin-top:6px;font-size:12px;align-items:center" title="Routes passing within this distance of a pole are automatically attached to it. Set 0 to disable.">
            📌 Auto-attach to poles within <input type="number" id="imp-snap" value="5" min="0" max="100" step="1" style="width:54px;padding:3px 6px;border:1px solid #ccc;border-radius:4px"> m
          </div>
        </div>` : ''}

        ${skippedPolygons ? `<p style="font-size:12px;color:#888;margin:4px 0 10px">ℹ ${skippedPolygons} polygon(s) skipped (not supported)</p>` : ''}

        ${(() => {
          const isPlanner = state.user && state.user.role === 'planner';
          return `<label class="import-plan-notice"><input type="checkbox" id="imp-plan" ${isPlanner ? 'checked disabled' : ''}> 🧭 Import as planning data (theoretical / plan mode)${isPlanner ? ' — required for plan-only accounts' : ''}</label>`;
        })()}

        ${(() => {
          const hasPhotos = _importZip && [...points, ...lines].some(f => f.photoSrcs && f.photoSrcs.length);
          if (!hasPhotos) return '';
          const photoCount = [...points, ...lines].reduce((n, f) => n + (f.photoSrcs ? f.photoSrcs.length : 0), 0);
          return `<div class="import-photo-notice">📷 ${photoCount} embedded photo(s) found — will be attached to each feature automatically.</div>`;
        })()}

        ${points.length ? buildFieldMappingHTML(parsed, 'pt') : ''}
        ${lines.length  ? buildFieldMappingHTML(parsed, 'ln') : ''}

        <div id="imp-progress-wrap" style="display:none">
          <div class="import-progress-wrap"><div class="import-progress-bar" id="imp-bar"></div></div>
          <div id="imp-progress-label" style="font-size:12px;color:#555;text-align:center;margin-bottom:6px"></div>
        </div>

        <div class="btn-row" id="imp-btn-row">
          <button class="btn-secondary" onclick="this.closest('.modal-bg').remove(); _pendingImport = null;">Cancel</button>
          <button class="btn-primary" onclick="startImport(this)">
            Import ${points.length + lines.length} features
          </button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', () => { bg.remove(); _pendingImport = null; });
}

// Auto-attach poles to an imported route: for every pole whose distance to the
// route polyline is within snapM meters, attach it and ensure the route has a
// vertex exactly at the pole (snapping a nearby endpoint or inserting a new
// vertex) so dragging the pole later moves the route with it.
// coords: [[lng,lat], ...]; poles: [{id, geom:{coordinates:[lng,lat]}}].
function autoAttachPolesToRoute(coords, poles, snapM) {
  if (!coords || coords.length < 2 || !poles.length || !(snapM > 0)) {
    return { coords, attachedPoleIds: [] };
  }
  const padDeg = snapM / 111320 + 1e-5;
  let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
  for (const [lng, lat] of coords) {
    minLng = Math.min(minLng, lng); maxLng = Math.max(maxLng, lng);
    minLat = Math.min(minLat, lat); maxLat = Math.max(maxLat, lat);
  }
  const attached = new Set();
  const insertions = []; // {segIndex, t, lng, lat}
  for (const p of poles) {
    const [plng, plat] = p.geom.coordinates;
    if (plng < minLng - padDeg || plng > maxLng + padDeg || plat < minLat - padDeg || plat > maxLat + padDeg) continue;
    const mPerLat = 111320, mPerLng = 111320 * Math.cos(plat * Math.PI / 180);
    let best = null;
    for (let i = 0; i < coords.length - 1; i++) {
      // segment endpoints relative to the pole (pole at origin), in meters
      const Ax = (coords[i][0]   - plng) * mPerLng, Ay = (coords[i][1]   - plat) * mPerLat;
      const Bx = (coords[i+1][0] - plng) * mPerLng, By = (coords[i+1][1] - plat) * mPerLat;
      const dx = Bx - Ax, dy = By - Ay;
      const len2 = dx * dx + dy * dy;
      let t = len2 > 0 ? -(Ax * dx + Ay * dy) / len2 : 0;
      t = Math.max(0, Math.min(1, t));
      const Cx = Ax + t * dx, Cy = Ay + t * dy;
      const dist = Math.hypot(Cx, Cy);
      if (!best || dist < best.dist) best = { segIndex: i, t, dist };
    }
    if (best && best.dist <= snapM) {
      attached.add(p.id);
      insertions.push({ segIndex: best.segIndex, t: best.t, lng: plng, lat: plat });
    }
  }
  if (!insertions.length) return { coords, attachedPoleIds: [] };
  // Snap to an existing endpoint when the projection lands on one; else insert.
  const snapMap = {};   // vertexIndex -> [lng,lat]
  const segInserts = {}; // segIndex -> [{t,lng,lat}]
  for (const ins of insertions) {
    if (ins.t <= 0.02)      snapMap[ins.segIndex]     = [ins.lng, ins.lat];
    else if (ins.t >= 0.98) snapMap[ins.segIndex + 1] = [ins.lng, ins.lat];
    else (segInserts[ins.segIndex] ||= []).push(ins);
  }
  const base = coords.map((c, i) => snapMap[i] ? snapMap[i].slice() : c.slice());
  const out = [];
  for (let i = 0; i < base.length; i++) {
    out.push(base[i]);
    if (segInserts[i]) {
      segInserts[i].sort((a, b) => a.t - b.t);
      for (const ins of segInserts[i]) out.push([ins.lng, ins.lat]);
    }
  }
  return { coords: out, attachedPoleIds: [...attached] };
}

async function startImport(btn) {
  const { parsed } = _pendingImport;
  const modal = btn.closest('.modal');
  const ptType = modal.querySelector('input[name="pt-type"]:checked')?.value ?? 'skip';
  const lnType = modal.querySelector('input[name="ln-type"]:checked')?.value ?? 'skip';
  const fCount = parseInt(modal.querySelector('#imp-fcount')?.value) || 12;
  const color  = modal.querySelector('#imp-color')?.value || '#FF8800';
  const snapM  = Math.max(0, parseFloat(modal.querySelector('#imp-snap')?.value) || 0);
  const asPlan = (modal.querySelector('#imp-plan')?.checked) || (state.user && state.user.role === 'planner');
  const groupName = asPlan ? _pendingImport.groupName.replace(/ - Imported$/, ' - Plan') : _pendingImport.groupName;
  const ptMapping = {}, lnMapping = {};
  modal.querySelectorAll('.imp-field-map').forEach(sel => {
    if (sel.dataset.scope === 'pt') ptMapping[sel.dataset.field] = sel.value;
    else                            lnMapping[sel.dataset.field] = sel.value;
  });
  // Plan mode only supports poles & routes — coerce point choices to poles.
  const effPtType = asPlan && ptType !== 'skip' ? 'pole' : ptType;
  const toImport = [
    ...(effPtType !== 'skip' ? parsed.points.map(p => ({ ...p, _type: effPtType })) : []),
    ...(lnType !== 'skip' ? parsed.lines.map(l => ({ ...l, _type: 'route'  })) : []),
  ];
  if (!toImport.length) { btn.closest('.modal-bg').remove(); return; }

  modal.querySelector('#imp-btn-row').style.display = 'none';
  modal.querySelector('#imp-progress-wrap').style.display = 'block';
  const bar = modal.querySelector('#imp-bar');
  const lbl = modal.querySelector('#imp-progress-label');
  const setProgress = (n) => {
    bar.style.width = Math.round(n / toImport.length * 100) + '%';
    lbl.textContent = `${n} / ${toImport.length}`;
  };
  setProgress(0);

  let layerId;
  try {
    const grp = await api('POST', '/layer-groups', { name: groupName });
    state.layerGroups.push({ ...grp, layers: [] });
    const lyr = await api('POST', `/layer-groups/${grp.id}/layers`, {
      name: 'Imported Features',
      allowed_types: ['pole', 'closure', 'route'],
    });
    layerId = lyr.id;
    state.layerGroups.find(g => g.id === grp.id).layers.push(lyr);
  } catch (e) {
    alert('Failed to create import layer: ' + e.message);
    btn.closest('.modal-bg').remove();
    return;
  }

  async function attachImportPhoto(entityType, entityId, photoSrc) {
    if (!photoSrc) return;
    try {
      if (/^https?:\/\//i.test(photoSrc)) {
        // External URL (e.g. Google My Maps hosted image) — proxy through server then save to entity_photos
        const res = await fetch('/api/uploads/proxy', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: photoSrc }),
        });
        if (!res.ok) { console.warn('[KMZ import] proxy failed, status:', res.status, await res.text()); return; }
        const { url } = await res.json();
        await fetch(`/api/photos/${entityType}/${entityId}/url`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
      } else {
        // Embedded file in ZIP — upload directly to entity_photos
        if (!_importZip) return;
        const base = photoSrc.split('/').pop();
        let entry = _importZip.files[photoSrc]
          || _importZip.files['files/' + base]
          || _importZip.files[base];
        if (!entry) {
          const baseLow = base.toLowerCase();
          const key = Object.keys(_importZip.files).find(k => k.split('/').pop().toLowerCase() === baseLow);
          if (key) entry = _importZip.files[key];
        }
        if (!entry) {
          console.warn('[KMZ import] image not found in ZIP:', photoSrc, '— available:', Object.keys(_importZip.files));
          return;
        }
        const blob = await entry.async('blob');
        const ext = base.toLowerCase().split('.').pop();
        const mimeMap = { jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png', gif: 'image/gif', webp: 'image/webp' };
        const fd = new FormData();
        fd.append('file', new File([blob], base, { type: mimeMap[ext] || 'image/jpeg' }));
        const res = await fetch(`/api/photos/${entityType}/${entityId}`, { method: 'POST', body: fd, credentials: 'include' });
        if (!res.ok) { console.warn('[KMZ import] upload failed, status:', res.status); return; }
        const photo = await res.json();
        console.log('[KMZ import] photo saved:', photo.url, '->', entityType, entityId);
      }
    } catch (e) { console.warn('[KMZ import] photo import failed for', photoSrc, e); }
  }

  let done = 0, errors = 0, attachCount = 0;
  for (const feat of toImport) {
    const mapped = applyFieldMapping(feat, feat._type === 'route' ? lnMapping : ptMapping);
    const fc = mapped.fiberCount ?? fCount;
    try {
      if (feat._type === 'pole') {
        const name = (mapped.poleName ?? mapped.featureName ?? feat.name) || randomPoleName();
        const p = await api('POST', '/poles', { name, notes: mapped.poleNotes ?? mapped.closureNotes, lat: feat.lat, lng: feat.lng, layer_id: layerId, is_plan: asPlan });
        p.geom = typeof p.geom === 'string' ? JSON.parse(p.geom) : p.geom;
        state.poles.push(p);
        for (const src of (feat.photoSrcs || [])) await attachImportPhoto('pole', p.id, src);
      } else if (feat._type === 'closure') {
        const name = (mapped.closureName ?? mapped.featureName ?? feat.name) || 'Closure';
        const c = await api('POST', '/closures', { name, notes: mapped.closureNotes ?? mapped.poleNotes, lat: feat.lat, lng: feat.lng, layer_id: layerId });
        c.geom = typeof c.geom === 'string' ? JSON.parse(c.geom) : c.geom;
        if (!c.cables) c.cables = [];
        state.closures.push(c);
        for (const src of (feat.photoSrcs || [])) await attachImportPhoto('closure', c.id, src);
      } else if (feat._type === 'pole_closure') {
        const pName = mapped.poleName ?? randomPoleName();
        const cName = (mapped.closureName ?? mapped.featureName ?? feat.name) || 'Closure';
        const p = await api('POST', '/poles', { name: pName, notes: mapped.poleNotes, lat: feat.lat, lng: feat.lng, layer_id: layerId });
        p.geom = typeof p.geom === 'string' ? JSON.parse(p.geom) : p.geom;
        state.poles.push(p);
        const c = await api('POST', '/closures', { name: cName, notes: mapped.closureNotes, lat: feat.lat, lng: feat.lng, pole_id: p.id, layer_id: layerId });
        c.geom = typeof c.geom === 'string' ? JSON.parse(c.geom) : c.geom;
        if (!c.cables) c.cables = [];
        state.closures.push(c);
        for (const src of (feat.photoSrcs || [])) {
          await attachImportPhoto('pole', p.id, src);
          await attachImportPhoto('closure', c.id, src);
        }
      } else if (feat._type === 'route') {
        const name = (mapped.featureName ?? feat.name) || 'Route';
        let points = feat.coords, attachedPoles = [];
        if (snapM > 0) {
          const res = autoAttachPolesToRoute(feat.coords, state.poles, snapM);
          points = res.coords; attachedPoles = res.attachedPoleIds;
          attachCount += attachedPoles.length;
        }
        const r = await api('POST', '/routes', { name, notes: mapped.poleNotes ?? mapped.closureNotes, points, fiber_count: fc, color, attached_poles: attachedPoles, layer_id: layerId, is_plan: asPlan });
        r.geom = typeof r.geom === 'string' ? JSON.parse(r.geom) : r.geom;
        state.routes.push(r);
      }
    } catch (e) { console.warn('Import error for', feat.name, e); errors++; }
    done++;
    setProgress(done);
  }
  _importZip = null;

  renderMap();
  renderLayersPanel();
  btn.closest('.modal-bg').remove();
  _pendingImport = null;
  const attachNote = attachCount ? ` ${attachCount} pole attachment${attachCount !== 1 ? 's' : ''} auto-detected.` : '';
  const msg = errors
    ? `Imported ${done - errors} of ${done} features (${errors} error${errors !== 1 ? 's' : ''} — see console).${attachNote}`
    : `Imported ${done} feature${done !== 1 ? 's' : ''} into "${groupName}".${attachNote}`;
  alert(msg);
}

function togglePlanMode(force) {
  if (state.user && state.user.role === 'planner') { state.planMode = true; }
  else { state.planMode = (typeof force === 'boolean') ? force : !state.planMode; }
  const btn = document.getElementById('btn-plan');
  if (btn) btn.classList.toggle('active', state.planMode);
  // Leave any placement/edit mode when toggling, to avoid acting on the wrong layer set
  if (state.mode !== 'select') setMode('select');
  updatePlanBanner();
  if (map) renderMap();
}

function updatePlanBanner() {
  let banner = document.getElementById('plan-banner');
  if (state.planMode) {
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'plan-banner';
      banner.style.cssText = 'position:absolute;top:88px;left:50%;transform:translateX(-50%);z-index:1200;background:#7E57C2;color:#fff;padding:4px 14px;border-radius:0 0 8px 8px;font-size:12px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.25);pointer-events:none;';
      document.body.appendChild(banner);
    }
    banner.textContent = '🧭 PLANNING MODE — live network is dimmed & read-only';
    banner.style.display = 'block';
  } else if (banner) {
    banner.style.display = 'none';
  }
}

function setMode(m) {
  if (state.selectRect) { map.removeLayer(state.selectRect); state.selectRect = null; }
  state.dragStart = null;
  if (map) map.dragging.enable();
  const wasEdit = state.mode === 'edit';
  if (wasEdit) { clearEditHandles(); clearEditSnap(); }
  // Check layer restriction for placement modes
  if (_PLACEMENT_TYPES[m]) {
    const activeLayer = getActiveLayer();
    if (activeLayer?.allowed_types?.length > 0 && !activeLayer.allowed_types.includes(_PLACEMENT_TYPES[m])) {
      showLayerBlockMessage(m, activeLayer.name);
      return;
    }
  }
  // If we're switching away from route mode and have points, auto-finish
  if (state.mode === 'route' && m !== 'route' && state.routePoints.length >= 2) {
    if (state.snapClosureId) {
      const cl = state.closures.find(c => c.id === state.snapClosureId);
      if (cl) {
        const [lng, lat] = cl.geom.coordinates;
        const last = state.routePoints.length - 1;
        state.routePoints[last] = [lat, lng];
        state.routeSnapClosures[last] = cl.id;
        if (cl.pole_id && !state.drawAttachedPoles.includes(cl.pole_id)) {
          state.drawAttachedPoles.push(cl.pole_id);
        }
      }
    } else if (state.snapPoleId) {
      const pole = state.poles.find(p => p.id === state.snapPoleId);
      if (pole) {
        const [lng, lat] = pole.geom.coordinates;
        const last = state.routePoints.length - 1;
        state.routePoints[last] = [lat, lng];
        if (!state.drawAttachedPoles.includes(pole.id)) state.drawAttachedPoles.push(pole.id);
      }
    } else if (state.snapSiteId) {
      const s = state.sites.find(s => s.id === state.snapSiteId);
      if (s) {
        const [lng, lat] = s.geom.coordinates;
        const last = state.routePoints.length - 1;
        state.routePoints[last] = [lat, lng];
        state.routeSnapSites[last] = s.id;
      }
    }
    const snapsCopy = [...state.routeSnapClosures];
    const sitesCopy = [...state.routeSnapSites];
    promptCreateRoute([...state.routePoints], null, snapsCopy, sitesCopy);
    if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }
    state.routePoints = [];
    state.routeSnapClosures = [];
    state.routeSnapSites = [];
  } else {
    state.routePoints = [];
    state.routeSnapClosures = [];
    state.routeSnapSites = [];
    if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }
  }
  state.drawAttachedPoles = [];
  clearSnap();
  clearPreview();
  state.mode = m;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  const hints = {
    select: 'Click a closure to view splices',
    closure: 'Click on the map to place a splice closure',
    route: 'Click points to draw fiber, double-click or switch tools to finish',
    pole: 'Click on the map to place a pole',
    site: 'Click on the map to place the site',
    delete: 'Drag a rectangle to select and delete items',
    edit: 'Drag poles and closures to move; click a fiber route to edit vertices'
  };
  document.getElementById('mode-hint').textContent = hints[m] || '';
  if (map) map.getContainer().style.cursor = (m === 'select' || m === 'edit') ? '' : 'crosshair';
  if (m === 'edit' || wasEdit) renderMap();
}

// ============ DATA LOADING ============
async function loadData() {
  try {
    const [closures, routes, poles, fieldDefs, sites, layerGroups] = await Promise.all([
      api('GET', '/closures'),
      api('GET', '/routes'),
      api('GET', '/poles'),
      api('GET', '/field-defs'),
      api('GET', '/sites'),
      api('GET', '/layer-groups'),
    ]);
    state.closures = closures;
    state.routes = routes;
    state.poles = poles;
    state.sites = sites;
    state.fieldDefs = fieldDefs;
    state.layerGroups = layerGroups;
    if (state.activeLayerId === null) {
      const defGroup = layerGroups.find(g => g.name === 'Default');
      const defLayer = defGroup?.layers?.find(l => l.name === 'Default');
      if (defLayer) state.activeLayerId = defLayer.id;
    }
    renderMap();
    zoomToTrace();
    updateActiveLayerLabel();
    updateToolbarRestrictions();
    if (_mapLayersPanelOpen) renderLayersPanel();
  } catch (err) {
    console.error(err);
  }
}

let _eventSource = null;
let _pollInterval = null;
let _lastSeenChanges = { closures: 0, poles: 0, routes: 0, sites: 0, layer_groups: 0, layers: 0 };
const _reloadTimers = {};

async function _applyTableChange(table) {
  if (state.mode !== 'select') return;
  try {
    if (table === 'closures') { state.closures = await api('GET', '/closures'); renderMap(); }
    else if (table === 'poles') { state.poles = await api('GET', '/poles'); renderMap(); }
    else if (table === 'routes') { state.routes = await api('GET', '/routes'); renderMap(); }
    else if (table === 'sites') { state.sites = await api('GET', '/sites'); renderMap(); }
    else if (table === 'layer_groups' || table === 'layers') {
      state.layerGroups = await api('GET', '/layer-groups');
      // Validate activeLayerId is still present; if not, fall back to Default
      const allLayers = state.layerGroups.flatMap(g => g.layers || []);
      if (state.activeLayerId !== null && !allLayers.find(l => l.id === state.activeLayerId)) {
        const defLayer = state.layerGroups.find(g => g.name === 'Default')?.layers?.find(l => l.name === 'Default');
        state.activeLayerId = defLayer?.id ?? null;
      }
      renderMap();
      updateActiveLayerLabel();
      updateToolbarRestrictions();
      if (_mapLayersPanelOpen) renderLayersPanel();
    }
  } catch (_) {}
}

function _scheduleReload(table) {
  clearTimeout(_reloadTimers[table]);
  _reloadTimers[table] = setTimeout(() => _applyTableChange(table), 200);
}

async function pollChanges() {
  try {
    const changes = await api('GET', '/changes');
    for (const table of ['closures', 'poles', 'routes', 'sites', 'layer_groups', 'layers']) {
      if (changes[table] && changes[table] > (_lastSeenChanges[table] || 0)) {
        _lastSeenChanges[table] = changes[table];
        _scheduleReload(table);
      }
    }
  } catch (_) {}
}

async function startSync() {
  // Set baseline so first poll doesn't re-fetch everything
  try {
    _lastSeenChanges = await api('GET', '/changes');
  } catch (_) {}

  // SSE for instant push (works when proxy supports streaming)
  if (_eventSource) { _eventSource.close(); _eventSource = null; }
  _eventSource = new EventSource('/api/events');
  _eventSource.onmessage = (e) => {
    try {
      const { table } = JSON.parse(e.data);
      if (!['closures', 'poles', 'routes', 'sites', 'layer_groups', 'layers'].includes(table)) return;
      _lastSeenChanges[table] = Date.now();
      _scheduleReload(table);
    } catch (_) {}
  };

  // Polling fallback — works through any reverse proxy (4 s interval)
  clearInterval(_pollInterval);
  _pollInterval = setInterval(pollChanges, 4000);
}

function isItemVisible(item) {
  if (!item.layer_id) return true;
  for (const g of state.layerGroups) {
    const l = (g.layers || []).find(l => l.id === item.layer_id);
    if (l) return g.visible !== false && l.visible !== false;
  }
  return true;
}

// Fiber trace highlight: /?trace=1,2,3 (route ids from a trace result)
const _traceRouteIds = new Set(
  (new URLSearchParams(location.search).get('trace') || '')
    .split(',').map(Number).filter(Boolean)
);
let _traceHalos = [];
let _traceZoomed = false;

function zoomToTrace() {
  if (_traceZoomed || !_traceRouteIds.size) return;
  const traced = state.routes.filter(r => _traceRouteIds.has(r.id));
  if (!traced.length) return;
  const allCoords = traced.flatMap(r => r.geom.coordinates.map(c => [c[1], c[0]]));
  map.fitBounds(L.latLngBounds(allCoords), { padding: [60, 60] });
  _traceZoomed = true;
}

function renderMap() {
  if (state.mode === 'edit' && state.editingRouteId !== null) return; // don't reset while vertex-editing
  // Clear existing markers
  Object.values(state.closureMarkers).forEach(m => map.removeLayer(m));
  Object.values(state.poleMarkers).forEach(m => map.removeLayer(m));
  Object.values(state.siteMarkers).forEach(m => map.removeLayer(m));
  Object.values(state.routeLayers).forEach(m => map.removeLayer(m));
  _traceHalos.forEach(m => map.removeLayer(m));
  _traceHalos = [];
  state.closureMarkers = {};
  state.poleMarkers = {};
  state.siteMarkers = {};
  state.routeLayers = {};

  // Render closures
  state.closures.forEach(c => {
    if (!isItemVisible(c)) return;
    const [lng, lat] = c.geom.coordinates;
    const fiberCount = (c.cables || []).reduce((s, ca) => s + ca.fiber_count, 0) || '?';
    const icon = L.divIcon({
      className: '',
      html: `<div class="closure-icon"><span>${fiberCount}</span></div>`,
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    const isEdit = state.mode === 'edit';
    const marker = L.marker([lat, lng], { icon, draggable: isEdit || !c.pole_id }).addTo(map);
    marker.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      if (state.mode === 'select') {
        if (c.pole_id && state.closures.filter(cl => cl.pole_id === c.pole_id).length > 1) {
          handlePoleClick(c.pole_id);
        } else {
          openClosurePanel(c.id);
        }
      } else if (state.mode !== 'edit') {
        if (state.mode === 'route' && !state.snapClosureId) state.snapClosureId = c.id;
        onMapClick({ ...e, latlng: marker.getLatLng() });
      }
    });
    if (isEdit) {
      marker.on('drag', (e) => { checkEditSnap(e.latlng); });
    }
    marker.on('dragend', async () => {
      const ll = marker.getLatLng();
      if (isEdit && state.editSnapPoleId) {
        const snappedPole = state.poles.find(p => p.id === state.editSnapPoleId);
        if (snappedPole) {
          const [pLng, pLat] = snappedPole.geom.coordinates;
          marker.setLatLng([pLat, pLng]);
          try {
            await api('PUT', '/closures/' + c.id, { name: c.name, notes: c.notes, lat: pLat, lng: pLng, pole_id: snappedPole.id });
            c.geom.coordinates = [pLng, pLat];
            c.pole_id = snappedPole.id;
          } catch (err) { alert('Failed to save closure position'); }
        }
        clearEditSnap();
      } else {
        try {
          const body = { name: c.name, notes: c.notes, lat: ll.lat, lng: ll.lng };
          if (isEdit) body.pole_id = null; // detach from pole when dragged freely in edit mode
          await api('PUT', '/closures/' + c.id, body);
          c.geom.coordinates = [ll.lng, ll.lat];
          if (isEdit) c.pole_id = null;
        } catch (err) { alert('Failed to save position'); }
      }
    });
    const snapPole = c.pole_id ? state.poles.find(p => p.id === c.pole_id) : null;
    marker.bindTooltip(c.name + (snapPole ? ` @ ${h(snapPole.name)}` : ''), { direction: 'top' });
    state.closureMarkers[c.id] = marker;
  });

  // Render poles
  state.poles.forEach(p => {
    if (!isItemVisible(p)) return;
    const isPlan = !!p.is_plan;
    if (!state.planMode && isPlan) return;        // plan objects hidden outside planning mode
    const dimmed = state.planMode && !isPlan;     // live network = read-only reference in plan mode
    const [lng, lat] = p.geom.coordinates;
    const poleClosureCount = state.closures.filter(c => c.pole_id === p.id).length;
    const hasClosure = poleClosureCount > 0;
    const countBadge = poleClosureCount > 1
      ? `<div style="position:absolute;top:-6px;right:-6px;width:14px;height:14px;background:#1565c0;color:white;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;">${poleClosureCount}</div>`
      : '';
    const poleFill = isPlan ? '#7E57C2' : '#5D4037';
    const icon = L.divIcon({
      className: '',
      html: `<div style="position:relative;width:10px;height:10px;opacity:${dimmed ? 0.3 : 1};">
        <div style="width:10px;height:10px;background:${poleFill};border:2px solid ${hasClosure ? '#1565c0' : 'white'};border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.3);"></div>
        ${countBadge}
      </div>`,
      iconSize: [10, 10], iconAnchor: [5, 5]
    });
    const poleIsEdit = state.mode === 'edit' && !dimmed;
    const marker = L.marker([lat, lng], { icon, draggable: poleIsEdit }).addTo(map);
    const poleClsNames = state.closures.filter(c => c.pole_id === p.id).map(c => h(c.name));
    const tipContent = `<strong>${isPlan ? 'PLAN: ' : ''}${h(p.name)}</strong>` +
      (poleClsNames.length ? `<br><span style="font-size:10px;opacity:.8">${poleClsNames.join(', ')}</span>` : '');
    marker.bindTooltip(tipContent, { direction: 'top' });
    if (!dimmed) marker.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      if (state.mode === 'select') {
        handlePoleClick(p.id);
      } else if (state.mode !== 'edit') {
        if (!state.snapPoleId) state.snapPoleId = p.id;
        onMapClick({ ...e, latlng: marker.getLatLng() });
      }
    });
    if (poleIsEdit) {
      let dragOrigLat, dragOrigLng;
      let dragClosureIds = [];
      let dragRouteVertices = []; // [{routeId, vertexIndex}]

      marker.on('dragstart', () => {
        [dragOrigLng, dragOrigLat] = p.geom.coordinates;
        dragClosureIds = state.closures.filter(c => c.pole_id === p.id).map(c => c.id);
        dragRouteVertices = [];
        state.routes.forEach(r => {
          if (!(r.attached_poles || []).includes(p.id)) return;
          r.geom.coordinates.forEach((coord, idx) => {
            if (Math.abs(coord[1] - dragOrigLat) < 1e-5 && Math.abs(coord[0] - dragOrigLng) < 1e-5) {
              dragRouteVertices.push({ routeId: r.id, vertexIndex: idx });
            }
          });
        });
      });

      marker.on('drag', (e) => {
        const ll = e.latlng;
        dragClosureIds.forEach(cId => {
          const cm = state.closureMarkers[cId];
          if (cm) cm.setLatLng(ll);
        });
        const routesSeen = new Set();
        dragRouteVertices.forEach(({ routeId, vertexIndex }) => {
          if (routesSeen.has(routeId)) return;
          routesSeen.add(routeId);
          const route = state.routes.find(r => r.id === routeId);
          const routeLine = state.routeLayers[routeId];
          if (!route || !routeLine) return;
          const newLatLngs = route.geom.coordinates.map((c, i) => {
            const isAttached = dragRouteVertices.some(v => v.routeId === routeId && v.vertexIndex === i);
            return isAttached ? [ll.lat, ll.lng] : [c[1], c[0]];
          });
          routeLine.setLatLngs(newLatLngs);
        });
      });

      marker.on('dragend', async () => {
        const ll = marker.getLatLng();
        try {
          await api('PUT', '/poles/' + p.id, { name: p.name, notes: p.notes, lat: ll.lat, lng: ll.lng });
          p.geom.coordinates = [ll.lng, ll.lat];
        } catch (err) { alert('Failed to save pole position'); return; }
        for (const cId of dragClosureIds) {
          const closure = state.closures.find(c => c.id === cId);
          if (!closure) continue;
          try {
            await api('PUT', '/closures/' + cId, { name: closure.name, notes: closure.notes, lat: ll.lat, lng: ll.lng });
            closure.geom.coordinates = [ll.lng, ll.lat];
          } catch (_) { /* non-fatal */ }
        }
        const routesSaved = new Set();
        for (const { routeId } of dragRouteVertices) {
          if (routesSaved.has(routeId)) continue;
          routesSaved.add(routeId);
          const route = state.routes.find(r => r.id === routeId);
          if (!route) continue;
          const points = route.geom.coordinates.map((coord, i) => {
            const isAttached = dragRouteVertices.some(v => v.routeId === routeId && v.vertexIndex === i);
            return isAttached ? [ll.lng, ll.lat] : coord;
          });
          try {
            await api('PUT', '/routes/' + routeId, { name: route.name, notes: route.notes, fiber_count: route.fiber_count, color: route.color, attached_poles: route.attached_poles, points });
            route.geom.coordinates = points;
          } catch (_) { /* non-fatal */ }
        }
      });
    }
    state.poleMarkers[p.id] = marker;
  });

  // Render routes
  state.routes.forEach(r => {
    if (!isItemVisible(r)) return;
    const isPlan = !!r.is_plan;
    if (!state.planMode && isPlan) return;        // plan routes hidden outside planning mode
    const dimmed = state.planMode && !isPlan;     // live network = read-only reference in plan mode
    const coords = r.geom.coordinates.map(c => [c[1], c[0]]);
    if (_traceRouteIds.has(r.id)) {
      _traceHalos.push(L.polyline(coords, { color: '#ffeb3b', weight: 12, opacity: 0.9 }).addTo(map));
    }
    const lineColor = isPlan ? (r.color && r.color !== '#FF8800' ? r.color : '#7E57C2') : (r.color || '#FF8800');
    const style = { color: lineColor, weight: 4, opacity: dimmed ? 0.3 : 0.85 };
    if (isPlan) style.dashArray = '8,6';
    const line = L.polyline(coords, style).addTo(map);
    const fcLabel = r.fiber_count ? ` (${r.fiber_count}F)` : '';
    line.bindTooltip((isPlan ? 'PLAN: ' : '') + r.name + fcLabel, { permanent: false, direction: 'top', sticky: true });
    if (!dimmed) line.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      if (state.mode === 'select') {
        openViewModal('route', r.id, state.routes.find(x => x.id === r.id));
      } else if (state.mode === 'edit') {
        if (state.editingRouteId === r.id) { clearEditHandles(); } else { startEditRoute(r.id); }
      }
    });
    state.routeLayers[r.id] = line;
  });

  // Render sites
  const SITE_STYLE = {
    office:          { bg: '#1565c0', emoji: '🏢' },
    pole_cabinet:    { bg: '#546e7a', emoji: '📦' },
    ground_cabinet:  { bg: '#37474f', emoji: '🗄️' },
    hut:             { bg: '#4e342e', emoji: '🏠' },
  };
  state.sites.forEach(s => {
    if (!isItemVisible(s)) return;
    const [lng, lat] = s.geom.coordinates;
    const style = SITE_STYLE[s.site_type] || { bg: '#555', emoji: '📍' };
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:38px;height:38px;background:${style.bg};border:2px solid white;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;">${style.emoji}</div>`,
      iconSize: [38, 38], iconAnchor: [19, 19]
    });
    const marker = L.marker([lat, lng], { icon }).addTo(map);
    marker.bindTooltip(s.name, { permanent: false, direction: 'top' });
    marker.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      if (state.mode === 'select') {
        window.location.href = '/site/' + s.id;
      } else {
        onMapClick({ ...e, latlng: marker.getLatLng() });
      }
    });
    state.siteMarkers[s.id] = marker;
  });
}

async function showFiberInfo(route) {
  const defs = state.fieldDefs.filter(d => d.entity_type === 'route');
  const rawValues = defs.length ? await api('GET', `/field-values/route/${route.id}`) : [];
  const valMap = {};
  rawValues.forEach(v => { valMap[v.field_def_id] = v.value; });

  const polePickerHtml = state.poles.length === 0 ? '' : `
    <label>Attached poles</label>
    <div style="max-height:90px;overflow-y:auto;border:1px solid #ccc;border-radius:4px;padding:4px 8px;background:#fafafa;">
      ${state.poles.map(p => `
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;cursor:pointer;">
          <input type="checkbox" class="pole-attach" value="${p.id}"${(route.attached_poles || []).includes(p.id) ? ' checked' : ''}>
          ${h(p.name)}
        </label>
      `).join('')}
    </div>`;

  let customHtml = '';
  defs.forEach(d => {
    const val = valMap[d.id] || '';
    if (d.field_type === 'dropdown') {
      const opts = (d.options || []).map(o => `<option value="${h(o)}" ${val===o?'selected':''}>${h(o)}</option>`).join('');
      customHtml += `<label>${h(d.field_label)}</label><select data-def="${d.id}"><option value=""></option>${opts}</select>`;
    } else if (d.field_type === 'photo') {
      const preview = val
        ? `<img id="photo-preview-${d.id}" src="${h(val)}" style="max-width:100%;max-height:160px;border-radius:4px;margin-bottom:4px;display:block;">`
        : `<img id="photo-preview-${d.id}" style="display:none;max-width:100%;max-height:160px;border-radius:4px;margin-bottom:4px;">`;
      customHtml += `<label>${h(d.field_label)}</label>${preview}<input type="hidden" data-def="${d.id}" value="${h(val)}"><input type="file" accept="image/*" style="margin-bottom:6px;" onchange="uploadPhoto(this,'${d.id}')">`;
    } else {
      customHtml += `<label>${h(d.field_label)}</label><input data-def="${d.id}" value="${h(val)}">`;
    }
  });

  showModal(`Fiber: ${route.name}`, `
    <label>Name</label><input id="m-name" value="${h(route.name)}">
    <label>Fiber count</label><input id="m-fc" type="number" min="1" max="288" value="${route.fiber_count || 12}">
    <label>Color</label><input id="m-color" type="color" value="${h(route.color || '#FF8800')}">
    <label>Notes</label><textarea id="m-notes" rows="3">${h(route.notes || '')}</textarea>
    ${polePickerHtml}
    ${customHtml ? `<div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px;">${customHtml}</div>` : ''}
    <div style="margin-top:14px;"><button onclick="deleteFiber(${route.id})" style="background:#c62828;color:white;padding:6px 14px;border:none;border-radius:5px;cursor:pointer;">Delete this fiber</button></div>
  `, async () => {
    const name = document.getElementById('m-name').value.trim();
    const fiberCount = parseInt(document.getElementById('m-fc').value) || 12;
    const color = document.getElementById('m-color').value;
    const notes = document.getElementById('m-notes').value.trim();
    const attachedPoles = [...document.querySelectorAll('.pole-attach:checked')].map(cb => parseInt(cb.value));
    if (!name) return false;
    const updated = await api('PUT', '/routes/' + route.id, { name, fiber_count: fiberCount, color, notes, attached_poles: attachedPoles });
    const idx = state.routes.findIndex(r => r.id === route.id);
    if (idx >= 0) state.routes[idx] = { ...state.routes[idx], ...updated };
    if (defs.length) {
      const values = {};
      document.querySelectorAll('[data-def]').forEach(el => { values[el.dataset.def] = el.value; });
      await api('PUT', `/field-values/route/${route.id}`, { values });
    }
    renderMap();
    return true;
  });
}

async function deleteFiber(routeId) {
  if (!confirm('Delete this fiber line?')) return;
  try {
    await api('DELETE', '/routes/' + routeId);
    state.routes = state.routes.filter(r => r.id !== routeId);
    for (const cl of state.closures) {
      if (!cl.cables) continue;
      const removed = cl.cables.filter(cab => cab.route_id === routeId).map(cab => cab.id);
      if (removed.length === 0) continue;
      cl.cables = cl.cables.filter(cab => cab.route_id !== routeId);
      if (cl.splices) {
        cl.splices = cl.splices.filter(s => !removed.includes(s.from_cable_id) && !removed.includes(s.to_cable_id));
      }
    }
    document.querySelectorAll('.modal-bg').forEach(el => el.remove());
    renderMap();
    if (state.selectedClosure) openClosurePanel(state.selectedClosure);
  } catch (err) { alert('Failed: ' + err.message); }
}

function promptBulkDelete(bounds) {
  const routesInside = state.routes.filter(r =>
    r.geom.coordinates.some(([lng, lat]) => bounds.contains(L.latLng(lat, lng)))
  );
  const closuresInside = state.closures.filter(c => {
    const [lng, lat] = c.geom.coordinates;
    return bounds.contains(L.latLng(lat, lng));
  });
  const polesInside = state.poles.filter(p => {
    const [lng, lat] = p.geom.coordinates;
    return bounds.contains(L.latLng(lat, lng));
  });

  if (!routesInside.length && !closuresInside.length && !polesInside.length) {
    alert('No items in selected area.');
    return;
  }

  const lines = [];
  if (routesInside.length)   lines.push(`${routesInside.length} fiber(s)`);
  if (closuresInside.length) lines.push(`${closuresInside.length} closure(s)`);
  if (polesInside.length)    lines.push(`${polesInside.length} pole(s)`);

  showModal('Delete Selected Items', `
    <div style="color:#c62828;font-weight:600;">This will permanently delete:</div>
    <ul style="margin:10px 0 6px;">${lines.map(l => `<li>${l}</li>`).join('')}</ul>
    <div style="font-size:0.82em;color:#888;">Associated cables and splices will also be removed.</div>
  `, async () => {
    try {
      for (const r of routesInside) {
        await api('DELETE', '/routes/' + r.id);
        state.routes = state.routes.filter(x => x.id !== r.id);
        for (const cl of state.closures) {
          if (!cl.cables) continue;
          const gone = cl.cables.filter(cab => cab.route_id === r.id).map(cab => cab.id);
          if (!gone.length) continue;
          cl.cables = cl.cables.filter(cab => cab.route_id !== r.id);
          if (cl.splices) cl.splices = cl.splices.filter(s => !gone.includes(s.from_cable_id) && !gone.includes(s.to_cable_id));
        }
      }
      for (const c of closuresInside) {
        await api('DELETE', '/closures/' + c.id);
        state.closures = state.closures.filter(x => x.id !== c.id);
      }
      for (const p of polesInside) {
        await api('DELETE', '/poles/' + p.id);
        state.poles = state.poles.filter(x => x.id !== p.id);
      }
      if (state.selectedClosure && !state.closures.find(c => c.id === state.selectedClosure)) {
        closePanel();
      }
      renderMap();
    } catch (err) { alert('Delete failed: ' + err.message); }
    return true;
  });
}

async function uploadPhoto(input, defId) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/api/uploads', { method: 'POST', body: fd, credentials: 'include' });
    const { url } = await res.json();
    const hidden = document.querySelector(`input[type=hidden][data-def="${defId}"]`);
    if (hidden) hidden.value = url;
    const img = document.getElementById('photo-preview-' + defId);
    if (img) { img.src = url; img.style.display = 'block'; }
  } catch (e) { alert('Photo upload failed'); }
}

function openPhotoLightbox(url) {
  let lb = document.getElementById('photo-lightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'photo-lightbox';
    lb.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;';
    lb.innerHTML = `
      <button onclick="closePhotoLightbox()" style="position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:30px;line-height:1;cursor:pointer;padding:0;opacity:.8;">✕</button>
      <a id="photo-lightbox-dl" download style="position:absolute;top:16px;right:62px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:4px 10px;font-size:13px;text-decoration:none;cursor:pointer;backdrop-filter:blur(4px);">⬇ Download</a>
      <img id="photo-lightbox-img" style="max-width:90vw;max-height:90vh;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.6);object-fit:contain;cursor:default;">
    `;
    lb.addEventListener('click', e => { if (e.target === lb) closePhotoLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePhotoLightbox(); });
    document.body.appendChild(lb);
  }
  lb.querySelector('#photo-lightbox-img').src = url;
  const dl = lb.querySelector('#photo-lightbox-dl');
  dl.href = url;
  dl.download = url.split('/').pop();
  lb.style.display = 'flex';
}
function closePhotoLightbox() {
  const lb = document.getElementById('photo-lightbox');
  if (lb) lb.style.display = 'none';
}

function entityPhotoThumbHtml(p) {
  return `<div id="ephoto-${p.id}" style="position:relative;display:inline-block;">
    <img src="${h(p.url)}" title="${h(p.caption||'')}" onclick="openPhotoLightbox('${h(p.url)}')" style="width:90px;height:68px;object-fit:cover;border-radius:4px;border:1px solid #ddd;cursor:zoom-in;">
    <button onclick="entityPhotoDelete(${p.id})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:18px;padding:0;text-align:center;">×</button>
  </div>`;
}

async function entityPhotoDelete(photoId) {
  if (!confirm('Delete this photo?')) return;
  try {
    await api('DELETE', '/photos/' + photoId);
    const el = document.getElementById('ephoto-' + photoId);
    if (el) el.remove();
    // Keep cached closure-panel photos in sync so a re-render doesn't resurrect it
    state.closures.forEach(c => {
      if (c.entityPhotos) c.entityPhotos = c.entityPhotos.filter(p => p.id !== photoId);
    });
  } catch (e) { alert('Delete failed: ' + e.message); }
}

// Closure side-panel upload: upload, then refresh cached photos and re-render.
async function closurePanelPhotoUpload(input, closureId) {
  await entityPhotoUpload(input, 'closure', closureId);
  const c = state.closures.find(x => x.id === closureId);
  if (c) {
    c.entityPhotos = await api('GET', `/photos/closure/${closureId}`).catch(() => c.entityPhotos || []);
    renderPanel();
  }
}

async function entityPhotoUpload(input, entityType, entityId) {
  const grid = document.getElementById('entity-photo-grid');
  const files = [...input.files];
  let failed = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`/api/photos/${entityType}/${entityId}`, { method: 'POST', body: fd, credentials: 'include' });
      if (!res.ok) throw new Error(await res.text());
      const photo = await res.json();
      if (grid) grid.insertAdjacentHTML('beforeend', entityPhotoThumbHtml(photo));
    } catch (e) { console.warn('Photo upload failed:', e); failed++; }
  }
  input.value = '';
  if (failed) alert(`${failed} of ${files.length} photo(s) failed to upload. Check the browser console for details.`);
}

// ============ EDIT MODAL ============
async function openEditModal(entityType, entityId, obj) {
  if (!obj) return;
  const defs = state.fieldDefs.filter(d => d.entity_type === entityType);
  const [rawValues, entityPhotos] = await Promise.all([
    defs.length ? api('GET', `/field-values/${entityType}/${entityId}`) : Promise.resolve([]),
    (entityType === 'pole' || entityType === 'closure') ? api('GET', `/photos/${entityType}/${entityId}`).catch(() => []) : Promise.resolve([]),
  ]);
  const valMap = {};
  rawValues.forEach(v => { valMap[v.field_def_id] = v.value; });

  let standardFields = `
    <label>Name</label><input id="ef-name" value="${h(obj.name || '')}">
    <label>Notes</label><textarea id="ef-notes" rows="2">${h(obj.notes || '')}</textarea>
  `;

      ? `<div style="font-size:11px;color:#7E57C2;margin:4px 0 6px;">🧭 Plan fiber — fiber count is assigned when promoted to the live network.</div>

            <label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;cursor:pointer;">

        : `<img id="photo-preview-${d.id}" style="display:none;max-width:100%;max-height:160px;border-radius:4px;margin-bottom:4px;">`;
      customHtml += `<label>${h(d.field_label)}</label>${preview}<input type="hidden" data-def="${d.id}" value="${h(val)}"><input type="file" accept="image/*" style="margin-bottom:6px;" onchange="uploadPhoto(this,'${d.id}')">`;
    } else {
      customHtml += `<label>${h(d.field_label)}</label><input data-def="${d.id}" value="${h(val)}">`;
    }
  });

  let photoGalleryHtml = '';
  if (entityType === 'pole' || entityType === 'closure') {
    const thumbs = entityPhotos.map(p => entityPhotoThumbHtml(p)).join('');
    photoGalleryHtml = `<div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px;">
      <label style="font-weight:600;display:block;margin-bottom:6px;">Photos</label>
      <div id="entity-photo-grid" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${thumbs}</div>
      <input type="file" accept="image/*" multiple style="font-size:12px;" onchange="entityPhotoUpload(this,'${entityType}','${entityId}')">
    </div>`;
  }

  showModal(`Edit ${entityType.charAt(0).toUpperCase() + entityType.slice(1)}`,
    standardFields + (customHtml ? `<div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px;">${customHtml}</div>` : '') + photoGalleryHtml,
    async () => {
      const name = document.getElementById('ef-name').value.trim();
      if (!name) return false;
      const notes = document.getElementById('ef-notes').value.trim();

      if (entityType === 'closure') {
        const updated = await api('PUT', `/closures/${entityId}`, { name, notes, lat: obj.geom.coordinates[1], lng: obj.geom.coordinates[0] });
        Object.assign(obj, updated);
      } else if (entityType === 'pole') {
        const updated = await api('PUT', `/poles/${entityId}`, { name, notes });
        Object.assign(obj, updated);
      } else if (entityType === 'route') {
        const fcEl = document.getElementById('ef-fc');
        const fc = obj.is_plan ? null : (parseInt(fcEl && fcEl.value) || obj.fiber_count || 12);

        const updated = await api('PUT', `/routes/${entityId}`, { name, notes, fiber_count: fc, color, attached_poles: attachedPoles });
        const idx = state.routes.findIndex(r => r.id === entityId);
        if (idx >= 0) state.routes[idx] = { ...state.routes[idx], ...updated };
        Object.assign(obj, updated);
      }

      if (defs.length) {
        const values = {};
        document.querySelectorAll('[data-def]').forEach(el => { values[el.dataset.def] = el.value; });
        await api('PUT', `/field-values/${entityType}/${entityId}`, { values });
      }

      renderMap();
      if (entityType === 'closure' && state.selectedClosure === entityId) openClosurePanel(entityId);
      return true;
    }
  );
}

    }

    const thumbs = entityPhotos.map(p => entityPhotoThumbHtml(p)).join('');
    rows += `<div class="view-row"><span class="view-label">Photos</span><span>
      <div id="entity-photo-grid" style="display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 6px;">${thumbs}</div>
      <label style="font-size:12px;color:#1565c0;cursor:pointer;">＋ Add photos

  const label = entityType === 'route' ? 'Fiber' : entityType.charAt(0).toUpperCase() + entityType.slice(1);

    : '';
  const canPromote = obj.is_plan && (entityType === 'route' || entityType === 'pole') && state.user && state.user.role !== 'planner';
  const promoteBtn = canPromote
    ? `<button id="view-promote-btn" style="background:#7E57C2;color:white;padding:8px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;">⬆ Promote to live</button>`
    : '';

    <div style="display:flex;align-items:center;gap:8px;">
      ${deleteBtn}
      ${promoteBtn}
      <button id="view-close-btn" style="margin-left:auto;padding:8px 16px;font-size:13px;border-radius:5px;cursor:pointer;border:1px solid #ccc;background:white;">Close</button>
      <button class="btn-primary" id="view-edit-btn">Edit</button>
    </div>
  </div>`;

  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  document.getElementById('view-close-btn').onclick = () => bg.remove();
  document.getElementById('view-edit-btn').onclick = () => { bg.remove(); openEditModal(entityType, entityId, obj); };
  if (canPromote) {
    document.getElementById('view-promote-btn').onclick = async () => {
      let body;
      if (entityType === 'route') {
        // A plan route has no fiber count — assign one now, at promotion.
        const ans = prompt('Promote this fiber to the live network.\n\nFiber count for the production route:', '12');
        if (ans === null) return;
        const fc = parseInt(ans, 10);
        if (!Number.isInteger(fc) || fc < 1) { alert('Enter a valid fiber count (1 or more).'); return; }
        body = { fiber_count: fc };
      } else {
        if (!confirm('Promote this pole to the live network? It will become a permanent production object.')) return;
        body = undefined;
      }
      try {
        const updated = await api('POST', `/${entityType}s/${entityId}/promote`, body);
        Object.assign(obj, updated);
        const arr = entityType === 'route' ? state.routes : state.poles;
        const idx = arr.findIndex(x => x.id === entityId);
        if (idx >= 0) arr[idx] = { ...arr[idx], ...updated };
        bg.remove();
        renderMap();
      } catch (e) { alert('Promote failed: ' + e.message); }
    };
  }
  if (entityType === 'route') {
    document.getElementById('view-del-btn').onclick = () => { bg.remove(); deleteFiber(entityId); };
  } else if (entityType === 'pole') {
    document.getElementById('view-del-btn').onclick = async () => {
      if (!confirm(`Delete pole "${obj.name}"? Closures attached to it will become standalone.`)) return;
      bg.remove();
      await api('DELETE', '/poles/' + entityId);
      state.poles = state.poles.filter(p => p.id !== entityId);
      state.closures.forEach(c => { if (c.pole_id === entityId) c.pole_id = null; });
      renderMap();
    };
  }
}

// ============ CREATE CLOSURE/POLE/ROUTE ============
function promptCreateClosure(latlng, snappedRouteId, snappedPoleId) {
  // Determine whether the snap is at a route endpoint or mid-span
  let routeCableMode = 'BOTH';
  if (snappedRouteId) {
    const snapRoute = state.routes.find(r => r.id === snappedRouteId);
    if (snapRoute) {
      const coords = snapRoute.geom.coordinates; // [lng, lat] pairs
      const THRESH = 1e-7;
      const atStart = Math.abs(coords[0][1] - latlng.lat) < THRESH &&
                      Math.abs(coords[0][0] - latlng.lng) < THRESH;
      const atEnd   = Math.abs(coords[coords.length - 1][1] - latlng.lat) < THRESH &&
                      Math.abs(coords[coords.length - 1][0] - latlng.lng) < THRESH;
      if (atStart) routeCableMode = 'OUT';
      else if (atEnd) routeCableMode = 'IN';
    }
  }

  const routeNote = snappedRouteId
    ? routeCableMode === 'BOTH'
      ? `<div style="font-size:11px;color:#2e7d32;margin-top:8px;">📡 Snapped to fiber mid-span — IN and OUT cables will be auto-created.</div>`
      : `<div style="font-size:11px;color:#2e7d32;margin-top:8px;">📡 Snapped to fiber endpoint — ${routeCableMode} cable will be auto-created.</div>`
    : '';
  const poleNote = snappedPoleId
    ? `<div style="font-size:11px;color:#1565c0;margin-top:6px;">📍 Snapped to pole — cables will be auto-created for attached fibers.</div>`
    : '';
  showModal('Add Splice Closure', `
    <label>Name</label><input id="m-name" value="SC-${String(state.closures.length + 1).padStart(3, '0')}">
    <label>Notes (optional)</label><textarea id="m-notes" rows="2"></textarea>
    ${routeNote}${poleNote}
    ${buildOnCreateHtml('closure')}
  `, async () => {
    const name = document.getElementById('m-name').value.trim();
    const notes = document.getElementById('m-notes').value.trim();
    if (!name) return false;
    const c = await api('POST', '/closures', { name, notes, lat: latlng.lat, lng: latlng.lng, pole_id: snappedPoleId, layer_id: state.activeLayerId });
    c.cables = [];
    state.closures.push(c);
    if (snappedRouteId) {
      const route = state.routes.find(r => r.id === snappedRouteId);
      if (route) {
        if (routeCableMode === 'IN' || routeCableMode === 'BOTH') {
          const cable = await api('POST', `/closures/${c.id}/cables`, { name: `${route.name} ↓`, fiber_count: route.fiber_count, direction: 'IN', route_id: route.id });
          c.cables.push(cable);
        }
        if (routeCableMode === 'OUT' || routeCableMode === 'BOTH') {
          const cable = await api('POST', `/closures/${c.id}/cables`, { name: `${route.name} ↑`, fiber_count: route.fiber_count, direction: 'OUT', route_id: route.id });
          c.cables.push(cable);
        }
      }
    }
    if (snappedPoleId) {
      const pole = state.poles.find(p => p.id === snappedPoleId);
      const pLng = pole ? pole.geom.coordinates[0] : null;
      const pLat = pole ? pole.geom.coordinates[1] : null;
      const THRESH = 1e-7;
      const routesAtPole = state.routes.filter(r => (r.attached_poles || []).includes(snappedPoleId));
      // Load cables for sibling closures on this pole (to avoid duplicating cables that already exist there)
      const siblingClosures = state.closures.filter(cl => cl.pole_id === snappedPoleId && cl.id !== c.id);
      for (const cl of siblingClosures) {
        if (!cl.cables) cl.cables = await api('GET', `/closures/${cl.id}/cables`);
      }
      for (const route of routesAtPole) {
        // Skip if this route already has cables in another closure on this pole
        const alreadyHasCables = siblingClosures.some(cl =>
          cl.cables && cl.cables.some(cab => cab.route_id === route.id)
        );
        if (alreadyHasCables) continue;
        const coords = route.geom.coordinates;
        let mode = 'BOTH';
        if (pole) {
          const atStart = Math.abs(coords[0][1] - pLat) < THRESH && Math.abs(coords[0][0] - pLng) < THRESH;
          const atEnd   = Math.abs(coords[coords.length - 1][1] - pLat) < THRESH && Math.abs(coords[coords.length - 1][0] - pLng) < THRESH;
          if (atStart) mode = 'OUT';
          else if (atEnd) mode = 'IN';
        }
        if (mode === 'IN' || mode === 'BOTH') {
          const cable = await api('POST', `/closures/${c.id}/cables`, { name: `${route.name} ↓`, fiber_count: route.fiber_count, direction: 'IN', route_id: route.id });
          c.cables.push(cable);
        }
        if (mode === 'OUT' || mode === 'BOTH') {
          const cable = await api('POST', `/closures/${c.id}/cables`, { name: `${route.name} ↑`, fiber_count: route.fiber_count, direction: 'OUT', route_id: route.id });
          c.cables.push(cable);
        }
      }
    }
    await saveOnCreateFields('closure', c.id);
    renderMap();
    setMode('select');
    return true;
  });
}

function promptCreatePole(latlng) {

    await saveOnCreateFields('pole', p.id);
    renderMap();
    setMode('select');
    return true;
  });
}
