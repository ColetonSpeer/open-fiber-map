      <button class="site-type-btn" data-type="hut"            style="padding:16px 10px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:22px;display:flex;flex-direction:column;align-items:center;gap:6px;"><span>🏠</span><span style="font-size:12px;font-weight:600;color:#333;">Hut</span></button>
    </div>
    <div style="text-align:right;margin-top:4px;"><button id="site-pick-cancel" style="padding:8px 16px;border:1px solid #ccc;border-radius:5px;cursor:pointer;background:white;">Cancel</button></div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  bg.querySelectorAll('.site-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.pendingSiteType = btn.dataset.type;
      bg.remove();
      setMode('site');
    });
  });
  bg.querySelector('#site-pick-cancel').onclick = () => bg.remove();
}

function promptCreateSite(latlng, siteType) {
  const LABELS = { office: 'Office', pole_cabinet: 'Pole Cabinet', ground_cabinet: 'Ground Cabinet', hut: 'Hut' };
  const label = LABELS[siteType] || 'Site';
  const defaultName = `${label}-${String(state.sites.length + 1).padStart(3, '0')}`;
  showModal(`Add ${label}`, `
    <label>Name</label><input id="m-name" value="${defaultName}">
    <label>Notes (optional)</label><textarea id="m-notes" rows="2"></textarea>
  `, async () => {
    const name = document.getElementById('m-name').value.trim();
    if (!name) return false;
    const s = await api('POST', '/sites', { name, notes: document.getElementById('m-notes').value.trim(), lat: latlng.lat, lng: latlng.lng, site_type: siteType, layer_id: state.activeLayerId });
    state.sites.push(s);
    renderMap();
    setMode('select');
    return true;
  });
}

function promptCreateRoute(points, tempLine, snapClosures, snapSites) {
  const attachedAtDraw = [...state.drawAttachedPoles];
  const snapClosuresCopy = snapClosures ? [...snapClosures] : [];
  const attachedSites = [...new Set((snapSites || []).filter(Boolean))];

  // Identify endpoint poles (position matches first or last drawn point)
  const THRESH_PRE = 1e-7;
  const endpointPoleIds = attachedAtDraw.filter(poleId => {
    const pole = state.poles.find(p => p.id === poleId);
    if (!pole) return false;
    const [pLng, pLat] = pole.geom.coordinates;
    const atStart = Math.abs(points[0][0] - pLat) < THRESH_PRE && Math.abs(points[0][1] - pLng) < THRESH_PRE;
    const atEnd   = Math.abs(points[points.length-1][0] - pLat) < THRESH_PRE && Math.abs(points[points.length-1][1] - pLng) < THRESH_PRE;
    return atStart || atEnd;
  });

  // Build closure picker selects for endpoint poles with 2+ closures
  let closurePickerHtml = '';
  endpointPoleIds.forEach(poleId => {
    const poleClosures = state.closures.filter(c => c.pole_id === poleId);
    if (poleClosures.length < 2) return;
    const pole = state.poles.find(p => p.id === poleId);
    closurePickerHtml += `<label>Closure at ${h(pole.name)}</label>
      <select id="cp-${poleId}">
        ${poleClosures.map(c => `<option value="${c.id}">${h(c.name)}</option>`).join('')}
      </select>`;
  });

  const poleNote = attachedAtDraw.length > 0
    ? `<div style="font-size:11px;color:#555;margin-top:6px;">📍 Snapped to ${attachedAtDraw.length} pole(s) along route</div>`
    : '';
  const siteNote = attachedSites.length > 0
    ? `<div style="font-size:11px;color:#555;margin-top:6px;">🏢 Entering ${attachedSites.length === 2 ? '2 sites' : '1 site'}</div>`
    : '';
  const planFc = state.planMode
    ? `<div style="font-size:11px;color:#7E57C2;margin:4px 0 8px;">🧭 Plan fiber — fiber count is assigned when promoted to the live network.</div>`
    : `<label>Fiber count</label><input id="m-fc" type="number" min="1" max="288" value="12">`;
  showModal('Add Fiber', `
    <label>Name</label><input id="m-name" value="Fiber-${state.routes.length + 1}">
    ${planFc}
    <label>Color</label><input id="m-color" type="color" value="#FF8800">
    <label>Notes (optional)</label><textarea id="m-notes" rows="2"></textarea>
    ${poleNote}
    ${siteNote}
    ${closurePickerHtml}
    ${buildOnCreateHtml('route')}
  `, async () => {
    const name = document.getElementById('m-name').value.trim();
    const fcEl = document.getElementById('m-fc');
    const fiberCount = state.planMode ? null : (parseInt(fcEl && fcEl.value) || 12);
    const color = document.getElementById('m-color').value;
    const notes = document.getElementById('m-notes').value.trim();
    if (!name) return false;
    clearPreview();
    const lnglat = points.map(p => [p[1], p[0]]);
    const r = await api('POST', '/routes', { name, notes: notes || null, fiber_count: fiberCount, color, attached_poles: attachedAtDraw, points: lnglat, attached_sites: attachedSites, layer_id: state.activeLayerId, is_plan: state.planMode });
    state.drawAttachedPoles = [];
    state.routes.push(r);

    // Auto-create cables in snapped closures
    const startClosureId = snapClosuresCopy[0] ?? null;
    const endClosureId   = snapClosuresCopy[snapClosuresCopy.length - 1] ?? null;
    const autoCreateCable = async (closureId, direction) => {
      const cable = await api('POST', `/closures/${closureId}/cables`, { name: r.name, fiber_count: r.fiber_count, direction, route_id: r.id });
      const cl = state.closures.find(c => c.id === closureId);
      if (cl && cl.cables) cl.cables.push(cable);
    };
    if (startClosureId && startClosureId === endClosureId) {
      await autoCreateCable(startClosureId, 'IN');
    } else {
      if (startClosureId) await autoCreateCable(startClosureId, 'OUT');
      if (endClosureId)   await autoCreateCable(endClosureId, 'IN');
    }
    if (state.selectedClosure && (state.selectedClosure === startClosureId || state.selectedClosure === endClosureId)) {
      openClosurePanel(state.selectedClosure);
    }

    // Auto-create cables in closures attached to poles — endpoint poles only (skip mid-span)
    const THRESH = 1e-7;
    for (const poleId of attachedAtDraw) {
      const pole = state.poles.find(p => p.id === poleId);
      if (!pole) continue;
      const poleClosures = state.closures.filter(c => c.pole_id === poleId);
      if (!poleClosures.length) continue;
      // For poles with multiple closures, use the user's selection; otherwise auto-pick the only one
      const pickEl = document.getElementById(`cp-${poleId}`);
      const poleClosure = pickEl
        ? poleClosures.find(c => c.id === parseInt(pickEl.value))
        : poleClosures[0];
      if (!poleClosure) continue;
      if (poleClosure.id === startClosureId || poleClosure.id === endClosureId) continue;
      const pLng = pole.geom.coordinates[0], pLat = pole.geom.coordinates[1];
      const atStart = Math.abs(points[0][0] - pLat) < THRESH && Math.abs(points[0][1] - pLng) < THRESH;
      const atEnd   = Math.abs(points[points.length - 1][0] - pLat) < THRESH && Math.abs(points[points.length - 1][1] - pLng) < THRESH;
      if (!atStart && !atEnd) continue; // mid-span pole — skip, user can add cable manually
      if (attachedAtDraw.length >= 2) {
        const inCable  = await api('POST', `/closures/${poleClosure.id}/cables`, { name: r.name, fiber_count: r.fiber_count, direction: 'IN',  route_id: r.id });
        const outCable = await api('POST', `/closures/${poleClosure.id}/cables`, { name: r.name, fiber_count: r.fiber_count, direction: 'OUT', route_id: r.id });
        if (poleClosure.cables) { poleClosure.cables.push(inCable); poleClosure.cables.push(outCable); }
      } else {
        const dir = atStart ? 'OUT' : 'IN';
        const cable = await api('POST', `/closures/${poleClosure.id}/cables`, { name: r.name, fiber_count: r.fiber_count, direction: dir, route_id: r.id });
        if (poleClosure.cables) poleClosure.cables.push(cable);
      }
      if (state.selectedClosure === poleClosure.id) openClosurePanel(state.selectedClosure);
    }

    if (tempLine) map.removeLayer(tempLine);
    await saveOnCreateFields('route', r.id);
    renderMap();
    setMode('select');
    return true;
  }, () => {
    clearPreview();
    if (tempLine) map.removeLayer(tempLine);
    state.drawAttachedPoles = [];
  });
}

// ============ MODAL ============
function showModal(title, bodyHtml, onConfirm, onCancel) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>${h(title)}</h2>
      <div class="modal-body">${bodyHtml}</div>
      <div class="btn-row">
        <button id="modal-cancel">Cancel</button>
        <button class="primary" id="modal-confirm">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  const close = () => document.body.removeChild(bg);
  bg.querySelector('#modal-cancel').onclick = () => { close(); onCancel && onCancel(); };
  bg.querySelector('#modal-confirm').onclick = async () => {
    try {
      const result = await onConfirm();
      if (result !== false) close();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  };
}

// ============ SIDE PANEL (SPLICES) ============
async function openClosurePanel(closureId) {
  const closure = state.closures.find(c => c.id === closureId);
  if (!closure) return;
  // Load cables and splices
  const [cables, splices, fieldValues, splitters, entityPhotos] = await Promise.all([
    api('GET', `/closures/${closureId}/cables`),
    api('GET', `/closures/${closureId}/splices`),
    api('GET', `/field-values/closure/${closureId}`),
    api('GET', `/closures/${closureId}/splitters`),
    api('GET', `/photos/closure/${closureId}`).catch(() => []),
  ]);
  closure.cables = cables;
  closure.splices = splices;
  closure.fieldValues = fieldValues;
  closure.splitters = splitters;
  closure.entityPhotos = entityPhotos;
  // Pre-load sibling closures' cables so the Add Cable picker can filter them out
  if (closure.pole_id) {
    const siblings = state.closures.filter(cl => cl.pole_id === closure.pole_id && cl.id !== closureId);
    for (const sib of siblings) {
      if (!sib.cables) sib.cables = await api('GET', `/closures/${sib.id}/cables`);
    }
  }
  if (state.selectedClosure !== closureId) {
    panelState.expandedCables.clear();
    panelState.expandedTubes.clear();
  }
  state.selectedClosure = closureId;
  state.spliceSel = { a: null, b: null };
  state.selectedSplice = null;
  state.spliceDeleteMode = false;
  state._delAnchor = null;
  state.showAddCable = false;
  state.showAddSplitter = false;
  splitterAssign = null;
  document.getElementById('side-panel').classList.add('open');
  renderPanel();
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  state.selectedClosure = null;
  state.spliceSel = { a: null, b: null };
  state.selectedSplice = null;
  state.spliceDeleteMode = false;
  state._delAnchor = null;
  splitterAssign = null;
}

function renderPanel() {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  if (!c) return;

  const connSet = new Set();
  c.splices.forEach(s => {
    connSet.add(`${s.from_cable_id}-${s.from_fiber}`);
    connSet.add(`${s.to_cable_id}-${s.to_fiber}`);
  });
  // Fibers bound to a splitter (input or any leg)
  const splitterFiberSet = new Set();
  (c.splitters || []).forEach(sp => {
    if (sp.input_cable_id != null && sp.input_fiber != null) splitterFiberSet.add(`${sp.input_cable_id}-${sp.input_fiber}`);
    (sp.outputs || []).forEach(o => {
      if (o.output_cable_id != null && o.output_fiber != null) splitterFiberSet.add(`${o.output_cable_id}-${o.output_fiber}`);
    });
  });
  const connectedSet = new Set([...connSet, ...splitterFiberSet]);

  const sel = state.spliceSel;
  let html = `
    <div class="panel-header">
      <div>
        <h2>${h(c.name)}</h2>
        ${(() => {
          let mf = '';
          if (c.notes) mf += `<div class="panel-meta-field"><span class="panel-meta-label">Notes</span>${h(c.notes)}</div>`;
          if (c.fieldValues && c.fieldValues.length) {
            for (const fv of c.fieldValues) {
              if (!fv.value) continue;
              const display = fv.field_type === 'photo'
                ? `<img src="${h(fv.value)}" onclick="openPhotoLightbox('${h(fv.value)}')" style="max-width:80px;max-height:60px;border-radius:3px;vertical-align:middle;cursor:zoom-in;">`
                : h(fv.value);
              mf += `<div class="panel-meta-field"><span class="panel-meta-label">${h(fv.field_label)}</span>${display}</div>`;
            }
          }
          {
            const thumbs = (c.entityPhotos || []).map(p => entityPhotoThumbHtml(p)).join('');
            mf += `<div class="panel-meta-field"><span class="panel-meta-label">Photos</span>
              <div id="entity-photo-grid" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;">${thumbs}</div>
              <label style="font-size:11px;color:#1565c0;cursor:pointer;display:inline-block;margin-top:4px;">＋ Add photos
                <input type="file" accept="image/*" multiple style="display:none;" onchange="closurePanelPhotoUpload(this,${c.id})">
              </label>
            </div>`;
          }
          return mf ? `<div class="panel-meta-fields">${mf}</div>` : '';
        })()}
        <div class="meta">${c.cables.length} cable(s) · ${c.splices.length} splice(s)${(c.splitters && c.splitters.length) ? ` · ${c.splitters.length} splitter(s)` : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        ${c.pole_id ? `<button class="icon-btn" title="View pole" style="font-size:15px;" onclick="openViewModal('pole',${c.pole_id},state.poles.find(p=>p.id===${c.pole_id}))">📍</button>` : ''}
        <button class="icon-btn" style="font-size:16px;" onclick="openEditModal('closure',${c.id},state.closures.find(x=>x.id===${c.id}))">✏️</button>
        <button class="close-btn" onclick="closePanel()">×</button>
      </div>
    </div>
  `;

  if (splitterAssign) {
    const sp = c.splitters.find(s => s.id === splitterAssign.splitterId);
    const tgt = splitterAssign.target === 'input' ? 'input' : `leg ${splitterAssign.target}`;
    html += `<div class="sel-bar" style="background:#fff3e0;border-color:#ffcc80;">
      <span>🌳 Assigning ${h(sp?.name || 'splitter')} ${tgt} — click a fiber to bind it</span>
      <button onclick="splitterAssign=null;renderPanel();">×</button>
    </div>`;
  } else if (sel.a || sel.b) {
    const sideSummary = (s) => {
      if (!s) return '<em style="opacity:.6">—</em>';
      const cab = c.cables.find(x => x.id === s.cableId);
      const list = s.fibers.length <= 4
        ? s.fibers.map(f => 'F' + (f + 1)).join(', ')
        : `F${s.fibers[0] + 1}–F${s.fibers[s.fibers.length - 1] + 1} (${s.fibers.length})`;
      return `${h(cab?.name || '?')} · ${list}`;
    };
    const na = sel.a ? sel.a.fibers.length : 0;
    const nb = sel.b ? sel.b.fibers.length : 0;
    let hint;
    if (!sel.b) hint = singleSelectedFiber() ? 'click another fiber to splice, or a splitter IN/leg to bind it' : 'select fibers on another cable';
    else if (na === nb) hint = 'connecting…';
    else hint = na > nb ? `select ${na - nb} more on ${h(c.cables.find(x => x.id === sel.b.cableId)?.name || 'side B')}`
                        : `${nb - na} extra on side B — deselect or add to side A`;
    const verb = state.spliceType === 'pass-through' ? 'glass-through' : 'fusion';
    html += `<div class="sel-bar" style="flex-wrap:wrap;">
      <span><b>A:</b> ${sideSummary(sel.a)} &nbsp; <b>B:</b> ${sideSummary(sel.b)}</span>
      <button onclick="state.spliceSel={a:null,b:null};renderPanel();" title="Clear selection">×</button>
      <span style="flex-basis:100%;font-size:10px;opacity:.8;">${na || nb} per side will ${verb}-connect when counts match · Shift-click = range · Ctrl-click = toggle — ${hint}</span>
    </div>`;
  } else if (state.spliceDeleteMode) {
    html += `<div class="sel-bar" style="background:#ffebee;border-color:#ef9a9a;color:#c62828;flex-wrap:wrap;">
      <span>✂ Delete mode — click a connected fiber, a splitter leg/IN row, or a line to break it · Shift-click = range</span>
      <button onclick="toggleSpliceDeleteMode()" title="Exit delete mode" style="color:#c62828;">×</button>
    </div>`;
  }

  // Auto-expand cables/tubes containing any selected fiber so their ports render
  [sel.a, sel.b].forEach(s => {
    if (!s) return;
    panelState.expandedCables.add(s.cableId);
    const cab = c.cables.find(x => x.id === s.cableId);
    if (cab && Math.ceil(cab.fiber_count / 12) > 1) {
      s.fibers.forEach(f => panelState.expandedTubes.add(`${s.cableId}-${Math.floor(f / 12)}`));
    }
  });

  // In a filtered view, expand cables/tubes that have visible fibers so the
  // connector lines anchor to the actual fibers (not a collapsed header).
  if (state.fiberFilter !== 'all') {
    c.cables.forEach(cab => {
      let any = false;
      for (let fi = 0; fi < cab.fiber_count; fi++) {
        if (fiberVisible(cab.id, fi, connectedSet, splitterFiberSet)) {
          any = true;
          panelState.expandedTubes.add(`${cab.id}-${Math.floor(fi / 12)}`);
        }
      }
      if (any) panelState.expandedCables.add(cab.id);
    });
  }

  html += `<div class="sd-typebar">Splice type:
    <button class="sd-typebtn ${state.spliceType === 'fusion' ? 'active' : ''}" onclick="setNewSpliceType('fusion')">◆ Fusion</button>
    <button class="sd-typebtn ${state.spliceType === 'pass-through' ? 'active' : ''}" onclick="setNewSpliceType('pass-through')">┄ Glass-through</button>
  </div>`;
  html += `<div class="sd-typebar">Show:
    <button class="sd-typebtn ${state.fiberFilter === 'all' ? 'active' : ''}" onclick="setFiberFilter('all')">All fibers</button>
    <button class="sd-typebtn ${state.fiberFilter === 'connected' ? 'active' : ''}" onclick="setFiberFilter('connected')">Connected</button>
    <button class="sd-typebtn ${state.fiberFilter === 'splitter' ? 'active' : ''}" onclick="setFiberFilter('splitter')">Splitters only</button>
    <button class="sd-typebtn sd-delbtn ${state.spliceDeleteMode ? 'active' : ''}" style="margin-left:auto;" onclick="toggleSpliceDeleteMode()" title="Click fibers to break their splices">✂ Delete</button>
  </div>`;
  html += renderSpliceDiagram(c, sel, connSet, connectedSet, splitterFiberSet);

  if (state.showAddCable) {
    if (c.pole_id) {
      const usedRouteIds = new Set(c.cables.filter(cab => cab.route_id).map(cab => cab.route_id));
      // Also exclude routes already cabled in sibling closures on the same pole
      state.closures
        .filter(cl => cl.pole_id === c.pole_id && cl.id !== c.id)
        .forEach(sib => {
          if (sib.cables) sib.cables.filter(cab => cab.route_id).forEach(cab => usedRouteIds.add(cab.route_id));
        });
      const eligible = state.routes.filter(r =>
        Array.isArray(r.attached_poles) && r.attached_poles.includes(c.pole_id) &&
        !usedRouteIds.has(r.id)
      );
      if (eligible.length === 0) {
        html += `<div class="form-card">
          <div style="color:#888;font-size:0.85em;">No unconnected fibers on this pole.</div>
          <div class="btn-row"><button onclick="state.showAddCable=false;renderPanel();">Cancel</button></div>
        </div>`;
      } else {
        html += `<div class="form-card">
          <label>Fiber</label>
          <select id="ac-route">${eligible.map(r =>
            `<option value="${r.id}">${h(r.name)} (${r.fiber_count}F)</option>`
          ).join('')}</select>
          <div class="btn-row">
            <button class="primary" onclick="doAddCable()">Add</button>
            <button onclick="state.showAddCable=false;renderPanel();">Cancel</button>
          </div>
        </div>`;
      }
    } else {
      html += `<div class="form-card">
        <label>Cable name</label>
        <input id="ac-name" value="Cable-${c.cables.length + 1}">
        <label>Fiber count</label>
        <input id="ac-fc" type="number" min="1" max="288" value="12">
        <label>Direction</label>
        <select id="ac-dir"><option value="IN">IN</option><option value="OUT">OUT</option></select>
        <div class="btn-row">
          <button class="primary" onclick="doAddCable()">Add</button>
          <button onclick="state.showAddCable=false;renderPanel();">Cancel</button>
        </div>
      </div>`;
    }
  } else {
    const siblingClosuresOnPole = c.pole_id
      ? state.closures.filter(cl => cl.pole_id === c.pole_id && cl.id !== c.id)
      : [];
    if (!state.showLinkClosure) {
      html += `<button class="add-btn" onclick="state.showAddCable=true;state.showLinkClosure=false;renderPanel();">+ Add cable</button>`;
      if (siblingClosuresOnPole.length > 0) {
        html += `<button class="add-btn" onclick="state.showLinkClosure=true;state.showAddCable=false;renderPanel();">↔ Link Closure</button>`;
      }
    }
    if (state.showLinkClosure) {
      const targetOptions = siblingClosuresOnPole.length === 1
        ? ''
        : `<label>Target closure</label>
           <select id="lc-target">
             ${siblingClosuresOnPole.map(cl => `<option value="${cl.id}">${h(cl.name)}</option>`).join('')}
           </select>`;
      html += `<div class="form-card">
        ${targetOptions}
        <label>Fiber count</label>
        <input id="lc-fc" type="number" min="1" max="288" value="12">
        <div class="btn-row">
          <button class="primary" onclick="doLinkClosure()">Link</button>
          <button onclick="state.showLinkClosure=false;renderPanel();">Cancel</button>
        </div>
      </div>`;
    }
  }

  if (c.splices.length > 0) {
    html += '<div class="section-title">Splice connections</div><div class="splice-list">';
    c.splices.forEach(s => {
      const fC = c.cables.find(x => x.id === s.from_cable_id);
      const tC = c.cables.find(x => x.id === s.to_cable_id);
      const fFc = FIBER_COLORS[s.from_fiber % 12];
      const tFc = FIBER_COLORS[s.to_fiber % 12];
      const isPass = s.splice_type === 'pass-through';
      const glyph = isPass
        ? `<span class="splice-type-glyph" title="Glass-through (uncut)">┄</span>`
        : `<span class="splice-type-glyph" title="Fusion splice">◆</span>`;
      html += `<div class="splice-item ${s.id === state.selectedSplice ? 'sel' : ''}">
        <span class="fiber-dot" style="background:${fFc.bg};border:1.5px solid ${fFc.border};width:10px;height:10px;"></span>
        <span>${h(fC?.name || '?')} F${s.from_fiber + 1}</span>
        ${glyph}
        <span class="fiber-dot" style="background:${tFc.bg};border:1.5px solid ${tFc.border};width:10px;height:10px;"></span>
        <span>${h(tC?.name || '?')} F${s.to_fiber + 1}</span>
        <button class="type-btn" onclick="toggleSpliceType(${s.id})" title="Toggle fusion / glass-through" style="margin-left:auto;">⇄</button>
        <button class="del-btn" onclick="deleteSplice(${s.id})" title="Remove" style="margin-left:0;">🗑</button>
      </div>`;
    });
    html += '</div>';
  }

  html += renderSplitterSection(c);

  html += `<div style="padding:10px;">
    <button class="add-btn" onclick="deleteClosure(${c.id})" style="border-color:#ffcdd2;color:#c62828;">Delete closure</button>
  </div>`;

  document.getElementById('side-panel').innerHTML = html;
  requestAnimationFrame(drawSpliceLines);
}

// ── Splice-tray diagram ───────────────────────────────────────────────────────
function cableSide(cable) {
  const ls = localStorage.getItem('ofm-cable-side-' + cable.id);
  if (ls === 'L' || ls === 'R') return ls;
  return cable.direction === 'OUT' ? 'R' : 'L';   // IN / link / unset default to left
}

function toggleCableSide(cableId) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const cab = c && c.cables.find(x => x.id === cableId);
  if (!cab) return;
  localStorage.setItem('ofm-cable-side-' + cableId, cableSide(cab) === 'L' ? 'R' : 'L');
  renderPanel();
}

function setNewSpliceType(t) { state.spliceType = t; renderPanel(); }
function setFiberFilter(m) { state.fiberFilter = m; renderPanel(); }
function toggleSpliceDeleteMode() {
  state.spliceDeleteMode = !state.spliceDeleteMode;
  state._delAnchor = null;
  state.spliceSel = { a: null, b: null };   // leave connect-selection
  splitterAssign = null;
  renderPanel();
}

function splitterSide(sp) {
  const ls = localStorage.getItem('ofm-splitter-side-' + sp.id);
  if (ls === 'L' || ls === 'R') return ls;
  return 'R';   // splitters default to the right column
}

function toggleSplitterSide(spId) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const sp = c && (c.splitters || []).find(x => x.id === spId);
  if (!sp) return;
  localStorage.setItem('ofm-splitter-side-' + spId, splitterSide(sp) === 'L' ? 'R' : 'L');
  renderPanel();
}

function fiberVisible(cableId, fi, connectedSet, splitterFiberSet) {
  if (state.fiberFilter === 'connected') return connectedSet.has(`${cableId}-${fi}`);
  if (state.fiberFilter === 'splitter') return splitterFiberSet.has(`${cableId}-${fi}`);
  return true;
}

function renderCableBox(cable, side, c, sel, connSet, connectedSet, splitterFiberSet) {
  const tubes = Math.ceil(cable.fiber_count / 12);
  const isExpanded = panelState.expandedCables.has(cable.id);
  const chevron = isExpanded ? '▼' : '▶';
  const dirBadge = cable.link_closure_id
    ? (() => {
        const linked = state.closures.find(cl => cl.id === cable.link_closure_id);
        return `<span class="dir-badge" style="background:#f3e5f5;color:#6a1b9a;">↔ ${linked ? h(linked.name) : 'Link'}</span>`;
      })()
    : `<span class="dir-badge dir-${h(cable.direction)}">${h(cable.direction)}</span>`;
  const sideBtn = `<button class="sd-side-btn" title="Move to other side" onclick="event.stopPropagation();toggleCableSide(${cable.id})">${side === 'L' ? '▶' : '◀'}</button>`;
  let html = `<div class="cable">
    <div class="cable-hdr" onclick="toggleCable(${cable.id})">
      <span>${chevron} ${h(cable.name)} · ${cable.fiber_count}F · ${dirBadge}</span>
      <span style="display:flex;gap:4px;align-items:center;">${sideBtn}<button class="icon-btn" onclick="event.stopPropagation();deleteCable(${cable.id})" title="Delete">🗑</button></span>
      <span class="sd-port" id="cablehdrport-${cable.id}" data-side="${side}"></span>
    </div>`;
  if (isExpanded) {
    for (let t = 0; t < tubes; t++) {
      const inTube = Math.min(12, cable.fiber_count - t * 12);
      const isTubeExpanded = panelState.expandedTubes.has(`${cable.id}-${t}`);
      if (tubes > 1) {
        const tc = FIBER_COLORS[t % 12];
        const tChevron = isTubeExpanded ? '▼' : '▶';
        html += `<div class="tube-label" onclick="toggleTube(${cable.id}, ${t})" style="cursor:pointer;user-select:none;">${tChevron} <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${tc.bg};border:1px solid ${tc.border};vertical-align:middle;margin-right:2px;"></span>${tc.name} tube (${inTube}F)<span class="sd-port" id="tubehdrport-${cable.id}-${t}" data-side="${side}"></span></div>`;
      }
      if (tubes === 1 || isTubeExpanded) {
        for (let f = 0; f < inTube; f++) {
          const fi = t * 12 + f;
          if (!fiberVisible(cable.id, fi, connectedSet, splitterFiberSet)) continue;
          const fc = FIBER_COLORS[f % 12];
          const isConn = connectedSet.has(`${cable.id}-${fi}`);
          const inA = sel.a && sel.a.cableId === cable.id && sel.a.fibers.includes(fi);
          const inB = sel.b && sel.b.cableId === cable.id && sel.b.fibers.includes(fi);
          const selCls = inA ? 'selected' : (inB ? 'selected-b' : '');
          html += `<div class="fiber-row ${selCls} ${isConn && !selCls ? 'connected' : ''}" onclick="selectFiber(${cable.id}, ${fi}, event)">
            <span class="fiber-dot" style="background:${fc.bg};border:1.5px solid ${fc.border};"></span>
            <span class="fiber-name">F${fi + 1} · ${fc.name}</span>
            <span class="sd-port" id="port-${cable.id}-${fi}" data-side="${side}"></span>
          </div>`;
        }
      }
    }
  }
  html += '</div>';
  return html;
}

function renderSpliceDiagram(c, sel, connSet, connectedSet, splitterFiberSet) {
  const left = [], right = [];
  const splL = [], splR = [];
  // In "Splitters only", keep only cables that actually feed a splitter (so their
  // bound-fiber ports still render for the connector lines); other cables are hidden.
  const cableHasBound = (cab) => [...splitterFiberSet].some(k => k.startsWith(cab.id + '-'));
  const cables = state.fiberFilter === 'splitter' ? c.cables.filter(cableHasBound) : c.cables;
  cables.forEach(cab => (cableSide(cab) === 'R' ? right : left).push(cab));
  (c.splitters || []).forEach(sp => (splitterSide(sp) === 'R' ? splR : splL).push(sp));
  const col = (cables, splitters, side) => {
    let inner = cables.map(cab => renderCableBox(cab, side, c, sel, connSet, connectedSet, splitterFiberSet)).join('');
    inner += splitters.map(sp => renderSplitterBox(sp, side, c)).join('');
    return inner || `<div class="sd-col-empty">Nothing on this side.<br>Use ◀ / ▶ to move a cable or splitter here.</div>`;
  };
  return `<div class="section-title">Splice tray</div>
    <div class="sd-diagram${state.spliceDeleteMode ? ' del-mode' : ''}" id="sd-diagram">
      <div class="sd-col left">${col(left, splL, 'L')}</div>
      <div class="sd-col right">${col(right, splR, 'R')}</div>
      <svg class="sd-svg" id="sd-svg"></svg>
    </div>`;
}

function renderSplitterBox(sp, side, c) {
  const isTap = sp.splitter_type === 'tap';
  const badge = isTap ? 'TAP' : (sp.ratio || '1:N');
  const sideBtn = `<button class="sd-side-btn" title="Move to other side" onclick="event.stopPropagation();toggleSplitterSide(${sp.id})">${side === 'L' ? '▶' : '◀'}</button>`;
  const boundLabel = (cableId, fiber0) => {
    if (cableId == null || fiber0 == null) return '<span style="color:#888;">— click, then a fiber</span>';
    const cable = c.cables.find(x => x.id === cableId);
    const fc = FIBER_COLORS[fiber0 % 12];
    return `<span class="fiber-dot" style="background:${fc.bg};border:1.5px solid ${fc.border};width:9px;height:9px;"></span> ${h(cable?.name || '?')} F${fiber0 + 1}`;
  };
  const assigning = (target) => splitterAssign && splitterAssign.splitterId === sp.id && splitterAssign.target === target;
  // In "Connected" view, show only the ports that are actually bound (like cables show only connected fibers).
  const connectedOnly = state.fiberFilter === 'connected';
  const inputBound = sp.input_cable_id != null && sp.input_fiber != null;
  const boundLegs = (sp.outputs || []).filter(o => o.output_cable_id != null && o.output_fiber != null).length;
  const collapsed = panelState.collapsedSplitters.has(sp.id);
  const chevron = collapsed ? '▶' : '▼';
  let html = `<div class="cable" style="border-left:3px solid #ff9800;">
    <div class="cable-hdr" onclick="toggleSplitter(${sp.id})" style="user-select:none;">
      <span>${chevron} 🌳 ${h(sp.name)} · <span class="dir-badge" style="background:#fff3e0;color:#e65100;">${h(badge)}</span>${collapsed ? ` <span style="color:#888;font-weight:400;">${(inputBound ? 1 : 0) + boundLegs} connected</span>` : ''}</span>
      <span style="display:flex;gap:4px;align-items:center;">${sideBtn}<button class="icon-btn" onclick="event.stopPropagation();deleteSplitter(${sp.id})" title="Delete">🗑</button></span>
      <span class="sd-port" id="splhdrport-${sp.id}" data-side="${side}"></span>
    </div>`;
  if (!collapsed) {
    if (!connectedOnly || inputBound) {
      html += `<div class="sd-splrow ${assigning('input') ? 'assigning' : ''}" onclick="beginSplitterAssign(${sp.id},'input')" title="Click, then a fiber, to bind the input">
        <span class="splrow-label">IN</span>
        <span class="splrow-val">${boundLabel(sp.input_cable_id, sp.input_fiber)}</span>
        <span class="sd-port" id="splport-${sp.id}-in" data-side="${side}"></span>
      </div>`;
    }
    (sp.outputs || []).forEach(o => {
      const legBound = o.output_cable_id != null && o.output_fiber != null;
      if (connectedOnly && !legBound) return;
      const pct = o.tap_percent != null ? ` ${o.tap_percent}%` : '';
      const loss = o.loss_db != null ? ` <span style="color:#1565c0;">−${(+o.loss_db).toFixed(1)}dB</span>` : '';
      html += `<div class="sd-splrow ${assigning(o.leg_index) ? 'assigning' : ''}" onclick="beginSplitterAssign(${sp.id},${o.leg_index})" title="Click, then a fiber, to bind this leg">
        <span class="splrow-label">Leg ${h(o.label || o.leg_index)}${pct}${loss}</span>
        <span class="splrow-val">${boundLabel(o.output_cable_id, o.output_fiber)}</span>
        <span class="sd-port" id="splport-${sp.id}-leg-${o.leg_index}" data-side="${side}"></span>
      </div>`;
    });
    if (connectedOnly && !inputBound && !boundLegs) {
      html += `<div class="sd-splrow" style="cursor:default;color:#aaa;">No connected ports</div>`;
    }
  }
  html += '</div>';
  return html;
}

const SVG_NS = 'http://www.w3.org/2000/svg';

// Draw connector lines between spliced fiber ports. Anchors fall back to the
// tube header, then the cable header, when a fiber's row is collapsed.
function drawSpliceLines() {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const diagram = document.getElementById('sd-diagram');
  const svg = document.getElementById('sd-svg');
  if (!c || !diagram || !svg) return;
  const dRect = diagram.getBoundingClientRect();
  const W = diagram.offsetWidth, H = diagram.offsetHeight;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const anchorEl = (el) => {
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2 - dRect.left, y: r.top + r.height / 2 - dRect.top, side: el.dataset.side };
  };
  const anchor = (cableId, fiberIdx) => anchorEl(
    document.getElementById(`port-${cableId}-${fiberIdx}`)
    || document.getElementById(`tubehdrport-${cableId}-${Math.floor(fiberIdx / 12)}`)
    || document.getElementById(`cablehdrport-${cableId}`)
  );
  const splitterAnchor = (spId, key) => anchorEl(
    document.getElementById(`splport-${spId}-${key}`)
    || document.getElementById(`splhdrport-${spId}`)   // collapsed → anchor to the splitter header
  );
  const curveD = (a, b) => {
    const off = a.side === b.side ? 60 : Math.max(40, Math.abs(b.x - a.x) * 0.4);
    const c1x = a.x + (a.side === 'L' ? off : -off);
    const c2x = b.x + (b.side === 'L' ? off : -off);
    return { d: `M ${a.x} ${a.y} C ${c1x} ${a.y}, ${c2x} ${b.y}, ${b.x} ${b.y}`, c1x, c2x };
  };
  // Split the splice cubic at its midpoint (De Casteljau) so each half can be
  // stroked in its own fiber's color, meeting at the splice triangle.
  const halfCurves = (a, b, c1x, c2x) => {
    const P0 = { x: a.x, y: a.y }, P1 = { x: c1x, y: a.y }, P2 = { x: c2x, y: b.y }, P3 = { x: b.x, y: b.y };
    const mid = (p, q) => ({ x: (p.x + q.x) / 2, y: (p.y + q.y) / 2 });
    const m01 = mid(P0, P1), m12 = mid(P1, P2), m23 = mid(P2, P3);
    const m012 = mid(m01, m12), m123 = mid(m12, m23);
    const m = mid(m012, m123);
    const dOf = (q0, q1, q2, q3) => `M ${q0.x} ${q0.y} C ${q1.x} ${q1.y}, ${q2.x} ${q2.y}, ${q3.x} ${q3.y}`;
    return { first: dOf(P0, m01, m012, m), second: dOf(m, m123, m23, P3), mid: m };
  };
  const addPath = (d, attrs) => {
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    Object.entries(attrs).forEach(([k, v]) => path.setAttribute(k, v));
    svg.appendChild(path);
    return path;
  };

  // Fiber↔fiber splices (hidden in Splitters-only view)
  if (state.fiberFilter !== 'splitter') {
    (c.splices || []).forEach(s => {
      const a = anchor(s.from_cable_id, s.from_fiber);
      const b = anchor(s.to_cable_id, s.to_fiber);
      if (!a || !b) return;
      const fcFrom = FIBER_COLORS[s.from_fiber % 12];
      const fcTo = FIBER_COLORS[s.to_fiber % 12];
      const isPass = s.splice_type === 'pass-through';
      const isSel = s.id === state.selectedSplice;
      const { c1x, c2x } = curveD(a, b);
      const halves = halfCurves(a, b, c1x, c2x);
      const baseAttrs = {
        'stroke-width': isSel ? 4 : 2.25, 'stroke-linecap': 'round',
        opacity: isSel ? 1 : 0.9, ...(isPass ? { 'stroke-dasharray': '5 4' } : {}),
      };
      const onClick = (e) => {
        e.stopPropagation();
        if (state.spliceDeleteMode) { breakSpliceById(s.id); return; }
        state.selectedSplice = (state.selectedSplice === s.id) ? null : s.id;
        renderPanel();
      };
      // Two halves, each in its own fiber's colour, meeting at the splice triangle.
      addPath(halves.first, { ...baseAttrs, stroke: fcFrom.bg }).addEventListener('click', onClick);
      addPath(halves.second, { ...baseAttrs, stroke: fcTo.bg }).addEventListener('click', onClick);
      if (!isPass) {
        const mx = halves.mid.x, my = halves.mid.y;
        const sameColor = fcFrom.bg === fcTo.bg;
        const node = document.createElementNS(SVG_NS, 'rect');
        node.setAttribute('x', mx - 4); node.setAttribute('y', my - 4);
        node.setAttribute('width', 8); node.setAttribute('height', 8);
        node.setAttribute('transform', `rotate(45 ${mx} ${my})`);
        node.setAttribute('fill', sameColor ? fcFrom.bg : '#ffffff');
        node.setAttribute('stroke', sameColor ? fcFrom.border : '#666');
        node.setAttribute('stroke-width', 1.5);
        node.addEventListener('click', onClick);
        svg.appendChild(node);
      }
    });
  }

  // Splitter wiring: fiber → IN port, leg port → fiber. A dot marks the splitter end.
  (c.splitters || []).forEach(sp => {
    const drawBind = (cableId, fiberIdx, spKey) => {
      if (cableId == null || fiberIdx == null) return;
      const f = anchor(cableId, fiberIdx);
      const p = splitterAnchor(sp.id, spKey);
      if (!f || !p) return;
      const fc = FIBER_COLORS[fiberIdx % 12];
      const { d, c1x, c2x } = curveD(f, p);
      const path = addPath(d, { stroke: fc.bg, 'stroke-width': 2.25, 'stroke-linecap': 'round', opacity: 0.95 });
      if (state.spliceDeleteMode) path.addEventListener('click', (e) => { e.stopPropagation(); unbindSplitterLink(sp.id, spKey); });
      // Fusion-splice joint (diamond) at the midpoint — the fiber is fusion-spliced to the splitter pigtail.
      const mx = 0.125 * f.x + 0.375 * c1x + 0.375 * c2x + 0.125 * p.x;
      const my = 0.5 * (f.y + p.y);
      const node = document.createElementNS(SVG_NS, 'rect');
      node.setAttribute('x', mx - 4); node.setAttribute('y', my - 4);
      node.setAttribute('width', 8); node.setAttribute('height', 8);
      node.setAttribute('transform', `rotate(45 ${mx} ${my})`);
      node.setAttribute('fill', fc.bg); node.setAttribute('stroke', fc.border); node.setAttribute('stroke-width', 1.5);
      svg.appendChild(node);
      // Small ring marks the splitter port end.
      const dot = document.createElementNS(SVG_NS, 'circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y); dot.setAttribute('r', 3.8);
      dot.setAttribute('fill', fc.bg); dot.setAttribute('stroke', '#ff9800'); dot.setAttribute('stroke-width', 1.5);
      svg.appendChild(dot);
    };
    drawBind(sp.input_cable_id, sp.input_fiber, 'in');
    (sp.outputs || []).forEach(o => drawBind(o.output_cable_id, o.output_fiber, 'leg-' + o.leg_index));
  });

  // Pending-pair preview: faint dashed lines for the in-order pairs being built.
  const sel = state.spliceSel;
  if (state.fiberFilter !== 'splitter' && sel.a && sel.b && sel.a.fibers.length && sel.b.fibers.length) {
    const aF = [...sel.a.fibers].sort((x, y) => x - y);
    const bF = [...sel.b.fibers].sort((x, y) => x - y);
    const pairs = Math.min(aF.length, bF.length);
    for (let i = 0; i < pairs; i++) {
      const a = anchor(sel.a.cableId, aF[i]);
      const b = anchor(sel.b.cableId, bF[i]);
      if (!a || !b) continue;
      addPath(curveD(a, b).d, { stroke: '#9ca3af', 'stroke-width': 1.5, 'stroke-dasharray': '3 4', opacity: 0.7 });
    }
  }
}

let _spliceResizeBound = false;
function bindSpliceResize() {
  if (_spliceResizeBound) return;
  _spliceResizeBound = true;
  window.addEventListener('resize', () => {
    if (state.selectedClosure && document.getElementById('sd-diagram')) drawSpliceLines();
  });
}
bindSpliceResize();

// Builds a 1-line description of a cable fiber, or an Assign button if unset
function fiberRefLabel(c, cableId, fiber0, onAssign) {
  if (cableId == null || fiber0 == null) {
    return `<button class="add-btn" style="padding:2px 8px;font-size:0.8em;display:inline;width:auto;" onclick="${onAssign}">Assign fiber</button>`;
  }
  const cable = c.cables.find(x => x.id === cableId);
  const fc = FIBER_COLORS[fiber0 % 12];
  return `<span class="fiber-dot" style="background:${fc.bg};border:1.5px solid ${fc.border};width:9px;height:9px;"></span>
    ${h(cable?.name || '?')} F${fiber0 + 1}
    <button class="icon-btn" style="font-size:11px;" title="Reassign" onclick="${onAssign}">✏️</button>`;
}

function renderSplitterSection(c) {
  // Splitters are now rendered as boxes inside the splice tray (renderSplitterBox);
  // this section only holds the add control + form.
  let html = '<div class="section-title">Splitters &amp; Taps</div>';

  if (state.showAddSplitter) {
    html += `<div class="form-card">
      <label>Name</label>
      <input id="sp-name" value="SPL-${(c.splitters?.length || 0) + 1}">
      <label>Type</label>
      <select id="sp-type" onchange="document.getElementById('sp-balanced').style.display=this.value==='balanced'?'':'none';document.getElementById('sp-tap').style.display=this.value==='tap'?'':'none';">
        <option value="balanced">Balanced splitter (1:N)</option>
        <option value="tap">Unbalanced tap</option>
      </select>
      <div id="sp-balanced">
        <label>Ratio</label>
        <select id="sp-ratio">
          ${['1:2','1:4','1:8','1:16','1:32','1:64'].map(r => `<option value="${r}">${r}</option>`).join('')}
        </select>
      </div>
      <div id="sp-tap" style="display:none;">
        <label>Tap split (tap % / pass %)</label>
        <select id="sp-tappct">
          ${[['5','95'],['10','90'],['20','80'],['30','70'],['50','50']].map(([t,p]) => `<option value="${t}">${t}/${p}</option>`).join('')}
        </select>
      </div>
      <div class="btn-row">
        <button class="primary" onclick="doAddSplitter()">Add</button>
        <button onclick="state.showAddSplitter=false;renderPanel();">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<button class="add-btn" onclick="state.showAddSplitter=true;renderPanel();">+ Add splitter / tap</button>`;
  }
  return html;
}

function toggleCable(cableId) {
  if (panelState.expandedCables.has(cableId)) {
    panelState.expandedCables.delete(cableId);
    for (const k of [...panelState.expandedTubes]) {
      if (k.startsWith(cableId + '-')) panelState.expandedTubes.delete(k);
    }
  } else {
    panelState.expandedCables.add(cableId);
  }
  renderPanel();
}

function toggleTube(cableId, tubeIdx) {
  const key = `${cableId}-${tubeIdx}`;
  if (panelState.expandedTubes.has(key)) {
    panelState.expandedTubes.delete(key);
  } else {
    panelState.expandedTubes.add(key);
  }
  renderPanel();
}

function toggleSplitter(spId) {
  if (panelState.collapsedSplitters.has(spId)) panelState.collapsedSplitters.delete(spId);
  else panelState.collapsedSplitters.add(spId);
  renderPanel();
}

async function doAddSplitter() {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  if (!c) return;
  const name = document.getElementById('sp-name').value.trim() || 'SPL';
  const type = document.getElementById('sp-type').value;
  const body = { closure_id: c.id, name, splitter_type: type };
  if (type === 'tap') {
    const tap = parseInt(document.getElementById('sp-tappct').value, 10);
    body.ratio = `${tap}/${100 - tap}`;
    body.outputs = [{ label: 'tap', tap_percent: tap }, { label: 'pass', tap_percent: 100 - tap }];
  } else {
    body.ratio = document.getElementById('sp-ratio').value;
  }
  try {
    const sp = await api('POST', '/splitters', body);
    if (!c.splitters) c.splitters = [];
    c.splitters.push(sp);
    state.showAddSplitter = false;
    renderPanel();
  } catch (err) { alert('Failed: ' + err.message); }
}

function beginSplitterAssign(splitterId, target) {
  if (state.spliceDeleteMode) {
    return unbindSplitterLink(splitterId, target === 'input' ? 'in' : 'leg-' + target);
  }
  // Fiber-first: if exactly one fiber is selected, bind it to this port now.
  const single = singleSelectedFiber();
  if (single) {
    return bindSplitterFiber(splitterId, target, single.cableId, single.fiberIdx);
  }
  splitterAssign = { splitterId, target };
  state.spliceSel = { a: null, b: null };
  renderPanel();
}

// Port-first: a splitter target is armed (splitterAssign), user clicked a fiber.
async function assignSplitterFiber(cableId, fiberIdx) {
  return bindSplitterFiber(splitterAssign.splitterId, splitterAssign.target, cableId, fiberIdx);
}

// Bind a fiber to a splitter target ('input' or a leg_index). Used by both
// port-first (assign then fiber) and fiber-first (select fiber then port) flows.
async function bindSplitterFiber(splitterId, target, cableId, fiberIdx) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const sp = c && (c.splitters || []).find(s => s.id === splitterId);
  if (!sp) { splitterAssign = null; return renderPanel(); }
  const payload = (target === 'input')
    ? { input_cable_id: cableId, input_fiber: fiberIdx }
    : { outputs: [{ leg_index: target, output_cable_id: cableId, output_fiber: fiberIdx }] };
  try {
    Object.assign(sp, await api('PUT', '/splitters/' + sp.id, payload));
  } catch (err) { alert('Failed: ' + err.message); }
  splitterAssign = null;
  state.spliceSel = { a: null, b: null };
  renderPanel();
}

// The single selected fiber across both selection sides, or null if 0 or >1.
function singleSelectedFiber() {
  const sel = state.spliceSel;
  const all = [];
  [sel.a, sel.b].forEach(s => { if (s) s.fibers.forEach(fi => all.push({ cableId: s.cableId, fiberIdx: fi })); });
  return all.length === 1 ? all[0] : null;
}

async function deleteSplitter(id) {
  if (!confirm('Delete this splitter?')) return;
  try {
    await api('DELETE', '/splitters/' + id);
    const c = state.closures.find(x => x.id === state.selectedClosure);
    c.splitters = c.splitters.filter(s => s.id !== id);
    if (splitterAssign && splitterAssign.splitterId === id) splitterAssign = null;
    renderPanel();
  } catch (err) { alert('Failed: ' + err.message); }
}

// Which selection side a cable belongs to (or should start). Returns 'a'|'b'|null.
function sideForCable(cableId) {
  const sel = state.spliceSel;
  if (sel.a && sel.a.cableId === cableId) return 'a';
  if (sel.b && sel.b.cableId === cableId) return 'b';
  if (!sel.a) return 'a';
  if (!sel.b) return 'b';
  return null; // both sides taken by other cables
}

function selectFiber(cableId, fiberIdx, event) {
  if (state.spliceDeleteMode) { return breakSpliceClick(cableId, fiberIdx, event); }
  if (splitterAssign) { return assignSplitterFiber(cableId, fiberIdx); }
  const sel = state.spliceSel;
  const shift = event && event.shiftKey;
  const toggle = event && (event.ctrlKey || event.metaKey);

  let key = sideForCable(cableId);
  if (key === null) {                 // both sides are other cables → start fresh A here
    state.spliceSel = { a: null, b: null };
    key = 'a';
  }
  let s = sel[key];
  if (!s || s.cableId !== cableId) { s = sel[key] = { cableId, fibers: [], anchor: fiberIdx }; }

  if (shift) {
    const lo = Math.min(s.anchor ?? fiberIdx, fiberIdx);
    const hi = Math.max(s.anchor ?? fiberIdx, fiberIdx);
    s.fibers = [];
    for (let i = lo; i <= hi; i++) s.fibers.push(i);
    if (s.anchor == null) s.anchor = fiberIdx;
  } else if (toggle) {
    const i = s.fibers.indexOf(fiberIdx);
    if (i >= 0) s.fibers.splice(i, 1); else s.fibers.push(fiberIdx);
    s.anchor = fiberIdx;
    if (!s.fibers.length) sel[key] = null;
  } else {
    // plain click: toggle-off if it's the lone member, else re-anchor to just this fiber
    if (s.fibers.length === 1 && s.fibers[0] === fiberIdx) sel[key] = null;
    else { s.fibers = [fiberIdx]; s.anchor = fiberIdx; }
  }

  maybeAutoConnect();
  renderPanel();
}

// When both sides hold an equal number of fibers, connect them pairwise (ascending).
async function maybeAutoConnect() {
  const sel = state.spliceSel;
  const c = state.closures.find(x => x.id === state.selectedClosure);
  if (!c || !sel.a || !sel.b) return;
  const n = sel.a.fibers.length;
  if (n < 1 || sel.b.fibers.length !== n) return;

  const aF = [...sel.a.fibers].sort((x, y) => x - y);
  const bF = [...sel.b.fibers].sort((x, y) => x - y);
  const aCable = sel.a.cableId, bCable = sel.b.cableId;
  state.spliceSel = { a: null, b: null };   // consume the selection up front

  const taken = (cab, fi) => c.splices.some(s =>
    (s.from_cable_id === cab && s.from_fiber === fi) || (s.to_cable_id === cab && s.to_fiber === fi));

  let skipped = 0;
  const jobs = [];
  for (let i = 0; i < n; i++) {
    if (taken(aCable, aF[i]) || taken(bCable, bF[i])) { skipped++; continue; }
    jobs.push(api('POST', '/splices', {
      closure_id: c.id,
      from_cable_id: aCable, from_fiber: aF[i],
      to_cable_id: bCable, to_fiber: bF[i],
      splice_type: state.spliceType
    }).then(sp => c.splices.push(sp)).catch(() => { skipped++; }));
  }
  try { await Promise.all(jobs); } catch (_) {}
  renderPanel();
  if (skipped) flashHint(`Connected ${n - skipped}, skipped ${skipped} (already spliced).`);
}

function flashHint(msg) {
  const el = document.getElementById('mode-hint');
  if (!el) return;
  const prev = el.textContent;
  el.style.color = document.body.classList.contains('dark-mode') ? '#fbbf24' : '#e65100';
  el.textContent = msg;
  setTimeout(() => { el.style.color = ''; el.textContent = prev; }, 3000);
}

// Delete-mode: break the splice(s) on a clicked fiber (Shift-click = range).
async function breakSpliceClick(cableId, fiberIdx, event) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  if (!c) return;
  let fibers = [fiberIdx];
  if (event && event.shiftKey && state._delAnchor && state._delAnchor.cableId === cableId) {
    const lo = Math.min(state._delAnchor.fiberIdx, fiberIdx);
    const hi = Math.max(state._delAnchor.fiberIdx, fiberIdx);
    fibers = [];
    for (let i = lo; i <= hi; i++) fibers.push(i);
  }
  state._delAnchor = { cableId, fiberIdx };
  const ids = (c.splices || []).filter(s => fibers.some(fi =>
    (s.from_cable_id === cableId && s.from_fiber === fi) ||
    (s.to_cable_id === cableId && s.to_fiber === fi)
  )).map(s => s.id);
  if (ids.length) {
    await Promise.all(ids.map(id => api('DELETE', '/splices/' + id).catch(() => {})));
    c.splices = c.splices.filter(s => !ids.includes(s.id));
    if (ids.includes(state.selectedSplice)) state.selectedSplice = null;
  }
  const unbound = await unbindSplitterAt(cableId, fibers);
  if (!ids.length && !unbound) { renderPanel(); return; }
  renderPanel();
  const parts = [];
  if (ids.length) parts.push(`${ids.length} splice${ids.length !== 1 ? 's' : ''}`);
  if (unbound) parts.push(`${unbound} splitter link${unbound !== 1 ? 's' : ''}`);
  flashHint(`Broke ${parts.join(' + ')}.`);
}

// Delete-mode: break one splice by id (used when clicking a connector line).
async function breakSpliceById(id) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  try { await api('DELETE', '/splices/' + id); } catch (_) {}
  if (c) c.splices = c.splices.filter(s => s.id !== id);
  if (state.selectedSplice === id) state.selectedSplice = null;
  renderPanel();
  flashHint('Splice broken.');
}

// Delete-mode: unbind any splitter input/leg sitting on the given fibers of a cable.
async function unbindSplitterAt(cableId, fibers) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  if (!c) return 0;
  let count = 0;
  for (const sp of (c.splitters || [])) {
    const payload = {};
    if (sp.input_cable_id === cableId && fibers.includes(sp.input_fiber)) {
      payload.input_cable_id = null; payload.input_fiber = null; count++;
    }
    const legs = (sp.outputs || []).filter(o => o.output_cable_id === cableId && fibers.includes(o.output_fiber));
    if (legs.length) {
      payload.outputs = legs.map(o => ({ leg_index: o.leg_index, output_cable_id: null, output_fiber: null, tap_percent: o.tap_percent, loss_db: o.loss_db, label: o.label }));
      count += legs.length;
    }
    if (payload.input_cable_id === null || payload.outputs) {
      try { Object.assign(sp, await api('PUT', '/splitters/' + sp.id, payload)); } catch (_) {}
    }
  }
  return count;
}

// Delete-mode: remove one splitter binding (used when clicking a splitter wiring line).
async function unbindSplitterLink(spId, spKey) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const sp = c && (c.splitters || []).find(x => x.id === spId);
  if (!sp) return;
  const payload = {};
  if (spKey === 'in') { payload.input_cable_id = null; payload.input_fiber = null; }
  else {
    const legIdx = parseInt(spKey.slice(4), 10);
    const o = (sp.outputs || []).find(x => x.leg_index === legIdx);
    payload.outputs = [{ leg_index: legIdx, output_cable_id: null, output_fiber: null, tap_percent: o?.tap_percent, loss_db: o?.loss_db, label: o?.label }];
  }
  try { Object.assign(sp, await api('PUT', '/splitters/' + spId, payload)); } catch (_) {}
  renderPanel();
  flashHint('Splitter link removed.');
}

async function deleteSplice(spliceId) {
  if (!confirm('Delete this splice?')) return;
  try {
    await api('DELETE', '/splices/' + spliceId);
    const c = state.closures.find(x => x.id === state.selectedClosure);
    c.splices = c.splices.filter(s => s.id !== spliceId);
    if (state.selectedSplice === spliceId) state.selectedSplice = null;
    renderPanel();
  } catch (err) { alert('Failed: ' + err.message); }
}

async function toggleSpliceType(spliceId) {
  const c = state.closures.find(x => x.id === state.selectedClosure);
  const s = c && c.splices.find(x => x.id === spliceId);
  if (!s) return;
  const next = s.splice_type === 'pass-through' ? 'fusion' : 'pass-through';
  try {
    const updated = await api('PUT', '/splices/' + spliceId, { splice_type: next });
    Object.assign(s, updated);
    renderPanel();
  } catch (err) { alert('Failed: ' + err.message); }
}

async function doAddCable() {
  const cl = state.closures.find(x => x.id === state.selectedClosure);
  if (!cl) return;
  try {
    if (cl.pole_id) {
      const routeId = parseInt(document.getElementById('ac-route').value);
      const route = state.routes.find(r => r.id === routeId);
      if (!route) return;
      if (Array.isArray(route.attached_poles) && route.attached_poles.length >= 2) {
        const inCable  = await api('POST', `/closures/${cl.id}/cables`, { name: route.name, fiber_count: route.fiber_count, direction: 'IN',  route_id: route.id });
        const outCable = await api('POST', `/closures/${cl.id}/cables`, { name: route.name, fiber_count: route.fiber_count, direction: 'OUT', route_id: route.id });
        cl.cables.push(inCable, outCable);
        panelState.expandedCables.add(inCable.id);
        panelState.expandedCables.add(outCable.id);
      } else {
        const pole = state.poles.find(p => p.id === cl.pole_id);
        let dir = 'IN';
        if (pole) {
          const THRESH = 1e-7;
          const [pLng, pLat] = pole.geom.coordinates;
          const coords = route.geom.coordinates;
          const atStart = Math.abs(coords[0][1] - pLat) < THRESH && Math.abs(coords[0][0] - pLng) < THRESH;
          if (atStart) dir = 'OUT';
        }
        const cable = await api('POST', `/closures/${cl.id}/cables`, { name: route.name, fiber_count: route.fiber_count, direction: dir, route_id: route.id });
        cl.cables.push(cable);
        panelState.expandedCables.add(cable.id);
      }
      state.showAddCable = false;
      renderPanel();
      renderMap();
      return;
    }
    const name = document.getElementById('ac-name').value.trim();
    const fc = parseInt(document.getElementById('ac-fc').value);
    const dir = document.getElementById('ac-dir').value;
    if (!name || !fc) return;
    const cable = await api('POST', `/closures/${cl.id}/cables`, { name, fiber_count: fc, direction: dir });
    cl.cables.push(cable);
    panelState.expandedCables.add(cable.id);
    if (Math.ceil(cable.fiber_count / 12) > 1) panelState.expandedTubes.add(`${cable.id}-0`);
    state.showAddCable = false;
    renderPanel();
    renderMap();
  } catch (err) { alert('Failed: ' + err.message); }
}

async function deleteCable(cableId) {
  if (!confirm('Delete this cable and all its splices?')) return;
  try {
    const c = state.closures.find(x => x.id === state.selectedClosure);
    const cable = c.cables.find(ca => ca.id === cableId);
    if (cable && cable.link_closure_id) {
      const linked = state.closures.find(cl => cl.id === cable.link_closure_id);
      if (linked && linked.cables) {
        const paired = linked.cables.find(ca => ca.link_closure_id === c.id);
        if (paired) {
          await api('DELETE', '/cables/' + paired.id);
          linked.cables = linked.cables.filter(ca => ca.id !== paired.id);
          linked.splices = (linked.splices || []).filter(s => s.from_cable_id !== paired.id && s.to_cable_id !== paired.id);
        }
      }
    }
    await api('DELETE', '/cables/' + cableId);
    c.cables = c.cables.filter(ca => ca.id !== cableId);
    c.splices = c.splices.filter(s => s.from_cable_id !== cableId && s.to_cable_id !== cableId);
    state.spliceSel = { a: null, b: null };
    renderPanel();
    renderMap();
  } catch (err) { alert('Failed: ' + err.message); }
}

async function doLinkClosure() {
  const cl = state.closures.find(x => x.id === state.selectedClosure);
  if (!cl) return;
  try {
    const fc = parseInt(document.getElementById('lc-fc').value) || 12;
    const siblings = state.closures.filter(sib => sib.pole_id === cl.pole_id && sib.id !== cl.id);
    const targetEl = document.getElementById('lc-target');
    const targetId = targetEl ? parseInt(targetEl.value) : siblings[0].id;
    const target = state.closures.find(x => x.id === targetId);
    if (!target) return;

    const outCable = await api('POST', `/closures/${cl.id}/cables`, {
      name: `→ ${target.name}`, fiber_count: fc, direction: 'OUT', link_closure_id: targetId
    });
    cl.cables.push(outCable);

    const inCable = await api('POST', `/closures/${targetId}/cables`, {
      name: `← ${cl.name}`, fiber_count: fc, direction: 'IN', link_closure_id: cl.id
    });
    if (!target.cables) target.cables = [];
    target.cables.push(inCable);

    state.showLinkClosure = false;
    renderPanel();
  } catch (err) { alert('Failed: ' + err.message); }
}

async function deleteClosure(closureId) {
  if (!confirm('Delete this closure and all its cables/splices?')) return;
  try {
    await api('DELETE', '/closures/' + closureId);
    state.closures = state.closures.filter(c => c.id !== closureId);
    closePanel();
    renderMap();
  } catch (err) { alert('Failed: ' + err.message); }
}

// ============ LAYERS PANEL ============
function renderLayersPanel() {
  const body = document.getElementById('map-layers-body');
  if (!body) return;
  if (!state.layerGroups.length) {
    body.innerHTML = '<div style="padding:16px;color:#888;font-size:12px;text-align:center;">No groups yet.<br>Click + New Group to start.</div>';
    return;
  }
  let html = '';
  for (const g of state.layerGroups) {
    const gVis = g.visible !== false;
    const isDefault = g.name === 'Default';
    html += `<div>
      <div class="ml-group-hdr">
        <button class="ml-vis-btn" onclick="toggleGroupVisibility(${g.id})" title="${gVis ? 'Hide group' : 'Show group'}">${gVis ? '👁' : '🚫'}</button>
        <span style="flex:1;${!gVis ? 'opacity:.5;' : ''}">${h(g.name)}</span>
        <button class="ml-action-btn" onclick="promptAddLayer(${g.id})" title="Add layer">+</button>
        ${!isDefault ? `<button class="ml-action-btn" onclick="promptRenameGroup(${g.id})" title="Rename">✏️</button>` : ''}
        ${!isDefault ? `<button class="ml-action-btn" onclick="promptDeleteGroup(${g.id})" title="Delete" style="color:#e53935;">🗑</button>` : ''}
      </div>`;
    for (const l of (g.layers || [])) {
      const lVis = l.visible !== false;
      const isActive = l.id === state.activeLayerId;
      const isDefaultLayer = isDefault && l.name === 'Default';
      const typePills = l.allowed_types?.length > 0
        ? l.allowed_types.map(t => `<span style="font-size:9px;padding:1px 5px;background:#e3f2fd;border-radius:8px;color:#1565c0;">${t}</span>`).join(' ')
        : '<span style="font-size:9px;color:#aaa;">any</span>';
      html += `<div class="ml-layer-row ${isActive ? 'active-layer' : ''}" onclick="setActiveLayer(${l.id})">
        <button class="ml-vis-btn" onclick="event.stopPropagation();toggleLayerVisibility(${l.id})" title="${lVis ? 'Hide' : 'Show'}">${lVis ? '👁' : '🚫'}</button>
        <span style="flex:1;${!lVis ? 'opacity:.5;' : ''}">${h(l.name)}</span>
        <span>${typePills}</span>
        ${!isDefaultLayer ? `<button class="ml-action-btn" onclick="event.stopPropagation();promptRenameLayer(${l.id})" title="Rename">✏️</button>` : ''}
        <button class="ml-action-btn" onclick="event.stopPropagation();promptEditLayerTypes(${l.id})" title="Set type restrictions">⚙️</button>
        ${!isDefaultLayer ? `<button class="ml-action-btn" onclick="event.stopPropagation();promptDeleteLayer(${l.id})" title="Delete" style="color:#e53935;">🗑</button>` : ''}
      </div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

async function toggleGroupVisibility(id) {
  const g = state.layerGroups.find(g => g.id === id);
  if (!g) return;
  g.visible = !g.visible;
  renderLayersPanel();
  renderMap();
  try { await api('PUT', '/layer-groups/' + id, { visible: g.visible }); } catch (_) {}
}

async function toggleLayerVisibility(id) {
  let newVis = true;
  for (const g of state.layerGroups) {
    const l = (g.layers || []).find(l => l.id === id);
    if (l) { l.visible = !l.visible; newVis = l.visible; break; }
  }
  renderLayersPanel();
  renderMap();
  try { await api('PUT', '/layers/' + id, { visible: newVis }); } catch (_) {}
}

    const g = await api('POST', '/layer-groups', { name });

    state.layerGroups.push(g);

}

function promptRenameGroup(id) {
  const g = state.layerGroups.find(g => g.id === id);
  if (!g) return;
  showModal('Rename Group', `<label>Group name</label><input id="m-name" value="${h(g.name)}">`, async () => {
    const name = document.getElementById('m-name').value.trim();

    await api('PUT', '/layer-groups/' + id, { name });

function promptDeleteGroup(id) {
  const g = state.layerGroups.find(g => g.id === id);
  if (!g) return;
  showModal('Delete Group', `<div style="color:#c62828;">Delete group "<strong>${h(g.name)}</strong>" and all its layers and features?<br><span style="font-size:12px;color:#888;">All poles, closures, routes, and sites in this group will be permanently deleted.</span></div>`, async () => {
    const layerIds = new Set((g.layers || []).map(l => l.id));
    await api('DELETE', '/layer-groups/' + id);
    state.layerGroups = state.layerGroups.filter(x => x.id !== id);
    state.poles    = state.poles.filter(p => !layerIds.has(p.layer_id));
    state.closures = state.closures.filter(c => !layerIds.has(c.layer_id));
    state.routes   = state.routes.filter(r => !layerIds.has(r.layer_id));
    state.sites    = state.sites.filter(s => !layerIds.has(s.layer_id));
    if (state.layerGroups.length && !state.layerGroups.flatMap(g => g.layers || []).find(l => l.id === state.activeLayerId)) {
      const defLayer = state.layerGroups.find(g => g.name === 'Default')?.layers?.find(l => l.name === 'Default');
      state.activeLayerId = defLayer?.id ?? null;
      updateActiveLayerLabel();
      updateToolbarRestrictions();
    }
    renderLayersPanel();
    renderMap();
    return true;
  });
}

function promptEditLayerTypes(id) {
  const l = state.layerGroups.flatMap(g => g.layers || []).find(l => l.id === id);
  if (!l) return;
  const typeOpts = ['closure', 'route', 'pole', 'site'].map(t =>
    `<label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:2px 0;cursor:pointer;"><input type="checkbox" class="layer-type-opt" value="${t}"${(l.allowed_types||[]).includes(t)?' checked':''}> ${t}</label>`
  ).join('');
  showModal(`Types for "${h(l.name)}"`, `
    <div style="font-size:12px;color:#666;margin-bottom:8px;">Check types this layer allows. Leave all unchecked for any type.</div>
    <div style="border:1px solid #ddd;border-radius:5px;padding:6px 10px;">${typeOpts}</div>
  `, async () => {
    const allowed_types = [...document.querySelectorAll('.layer-type-opt:checked')].map(cb => cb.value);
    await api('PUT', '/layers/' + id, { allowed_types });
    l.allowed_types = allowed_types;
    renderLayersPanel();
    if (l.id === state.activeLayerId) updateToolbarRestrictions();
    return true;
  });
}

function promptDeleteLayer(id) {
  const l = state.layerGroups.flatMap(g => g.layers || []).find(l => l.id === id);
  if (!l) return;
  showModal('Delete Layer', `<div style="color:#c62828;">Delete layer "<strong>${h(l.name)}</strong>"?<br><span style="font-size:12px;color:#888;">Items in this layer will become always-visible.</span></div>`, async () => {
    await api('DELETE', '/layers/' + id);
    for (const g of state.layerGroups) {
      g.layers = (g.layers || []).filter(x => x.id !== id);
    }
    if (state.activeLayerId === id) {
      const defLayer = state.layerGroups.find(g => g.name === 'Default')?.layers?.find(l => l.name === 'Default');
      state.activeLayerId = defLayer?.id ?? null;
      updateActiveLayerLabel();
      updateToolbarRestrictions();
    }
    renderLayersPanel();
    renderMap();
    return true;
  });
}

// ============ STARTUP ============
checkSession();
</script>
