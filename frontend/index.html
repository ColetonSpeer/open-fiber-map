<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Fiber Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; height: 100vh; overflow: hidden; }

/* Login screen */
#login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
#login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 360px; }
#login-box h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
#login-box .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
#login-box label { display: block; font-size: 13px; color: #444; margin-bottom: 4px; margin-top: 12px; }
#login-box input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; }
#login-box input:focus { outline: none; border-color: #1a1a2e; }
#login-box button { width: 100%; padding: 11px; font-size: 14px; background: #1a1a2e; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: 500; }
#login-box button:hover { background: #2a2a3e; }
#login-error { color: #c62828; font-size: 13px; margin-top: 10px; display: none; }

/* Main app */
#app { display: none; flex-direction: column; height: 100vh; }
#topbar { display: flex; align-items: center; padding: 8px 14px; background: #1a1a2e; color: white; gap: 10px; transition: padding-left .22s ease; }
#topbar h1 { font-size: 16px; font-weight: 600; }
#topbar .spacer { flex: 1; }
#topbar button { padding: 5px 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; cursor: pointer; font-size: 12px; }
#topbar button:hover { background: rgba(255,255,255,0.2); }
#topbar .user-info { font-size: 12px; opacity: 0.8; }

/* Toolbar */
#toolbar { display: flex; gap: 6px; padding: 7px 10px; background: white; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; align-items: center; transition: padding-left .22s ease; }
.tb { padding: 6px 12px; font-size: 12px; border: 1px solid #d0d0d0; border-radius: 5px; background: white; cursor: pointer; color: #333; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.tb:hover { background: #f5f5f7; }
.tb.active { background: #e3f2fd; color: #1565c0; border-color: #1565c0; }
.tb.danger { color: #c62828; border-color: #ffcdd2; }
.tb.danger:hover { background: #ffebee; }
#mode-hint { margin-left: auto; font-size: 11px; color: #888; }

/* Main area */
#main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; }
#side-panel { width: 360px; background: white; border-left: 1px solid #e0e0e0; overflow-y: auto; display: none; }
#side-panel.open { display: block; }
.panel-header { padding: 12px 14px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
.panel-header h2 { font-size: 15px; font-weight: 600; }
.panel-header .meta { font-size: 11px; color: #888; margin-top: 2px; }
.panel-meta-fields { margin: 4px 0 6px; display: flex; flex-direction: column; gap: 3px; }
.panel-meta-field  { font-size: 13px; color: #444; line-height: 1.4; }
.panel-meta-label  { font-weight: 600; color: #666; margin-right: 4px; }
.close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; padding: 0 4px; }
.close-btn:hover { color: #333; }

/* Cable section */
.section-title { font-size: 10px; font-weight: 600; color: #888; padding: 10px 14px 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.cable { border: 1px solid #e0e0e0; border-radius: 6px; margin: 6px 10px; overflow: hidden; }
.cable-hdr { padding: 7px 10px; background: #f5f5f7; font-size: 12px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.dir-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }
.dir-IN { background: #e3f2fd; color: #1565c0; }
.dir-OUT { background: #e8f5e9; color: #2e7d32; }
.tube-label { font-size: 10px; color: #888; padding: 3px 10px; background: #fafafa; border-top: 1px solid #f0f0f0; }
.fiber-row { display: flex; align-items: center; gap: 7px; padding: 4px 10px; cursor: pointer; }
.fiber-row:hover { background: #f8f8fa; }
.fiber-row.selected { background: #e3f2fd; outline: 1.5px solid #1565c0; }
.fiber-row.connected .fiber-dot { opacity: 0.5; }
.fiber-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.fiber-name { font-size: 12px; color: #333; }
.conn-info { font-size: 10px; color: #888; margin-left: auto; display: flex; align-items: center; gap: 4px; }

/* Selection bar */
.sel-bar { padding: 7px 12px; background: #e3f2fd; font-size: 11px; color: #1565c0; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #bbdefb; }
.sel-bar button { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 16px; color: #1565c0; padding: 0 4px; }

/* Add buttons */
.add-btn { margin: 6px 10px; padding: 7px 10px; font-size: 12px; border: 1px dashed #ccc; border-radius: 5px; background: none; cursor: pointer; color: #666; width: calc(100% - 20px); display: flex; align-items: center; gap: 6px; justify-content: center; }
.add-btn:hover { background: #f5f5f7; color: #333; }

/* Forms */
.form-card { margin: 6px 10px; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fafafa; }
.form-card label { font-size: 11px; color: #666; display: block; margin-bottom: 3px; margin-top: 8px; }
.form-card label:first-child { margin-top: 0; }
.form-card input, .form-card select, .form-card textarea { width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; background: white; }
.form-card .btn-row { display: flex; gap: 6px; margin-top: 10px; }
.form-card .btn-row button { flex: 1; padding: 6px; font-size: 12px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; background: white; }
.form-card .btn-row button.primary { background: #1565c0; color: white; border-color: #1565c0; }

/* Splice list */
.splice-list { margin: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
.splice-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
.splice-item:last-child { border-bottom: none; }
.splice-item .del-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: #888; font-size: 14px; padding: 1px 4px; }
.splice-item .del-btn:hover { color: #c62828; }

/* Modals */
.modal-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: white; border-radius: 8px; padding: 24px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal label { display: block; font-size: 12px; color: #666; margin: 10px 0 4px; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 5px; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.modal .btn-row button { padding: 8px 16px; font-size: 13px; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; background: white; }
.modal .btn-row button.primary { background: #1565c0; color: white; border-color: #1565c0; }


/* Markers */
.closure-icon { width: 28px; height: 28px; background: #1565c0; border: 2px solid white; border-radius: 5px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
.closure-icon span { color: white; font-size: 9px; font-weight: 700; }

/* Icon buttons */
.icon-btn { background: none; border: none; cursor: pointer; color: #888; padding: 2px 4px; font-size: 14px; }
.icon-btn:hover { color: #333; }

/* View modal */
.view-row { display: flex; gap: 10px; font-size: 13px; padding: 2px 0; }
.view-label { font-weight: 600; min-width: 90px; color: #555; flex-shrink: 0; }
.btn-primary { background: #1565c0; color: white; border: none; border-radius: 5px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
.btn-primary:hover { background: #1976d2; }
.tb.layer-blocked { opacity: 0.4; cursor: not-allowed; }

/* Dark mode */
body.dark-mode { background: #111827; color: #f3f4f6; }
body.dark-mode #topbar { background: #0d1117; }
body.dark-mode #toolbar { background: #1f2937; border-bottom-color: #374151; }
body.dark-mode .tb { background: #1f2937; border-color: #374151; color: #d1d5db; }
body.dark-mode .tb:hover { background: #374151; }
body.dark-mode .tb.active { background: #1e3a5f; color: #60a5fa; border-color: #2563eb; }
body.dark-mode #views-panel { background: #1f2937!important; border-color: #374151!important; color: #9ca3af; }
body.dark-mode #views-panel label { color: #d1d5db; }
body.dark-mode #views-panel [style*="border-top"] { border-top-color: #374151!important; }
body.dark-mode #map-layers-panel { background: #1f2937; border-right-color: #374151; }
body.dark-mode #map-layers-panel [style*="background:#f8f8fa"] { background-color: #374151!important; border-bottom-color: #374151!important; }
body.dark-mode #map-layers-panel [style*="border-top:1px solid #e0e0e0"] { border-top-color: #374151!important; }
body.dark-mode #map-layers-panel [style*="background:white"] { background-color: #1f2937!important; border-color: #4b5563!important; color: #9ca3af!important; }
body.dark-mode #map-layers-tab { background: #1f2937; border-color: #374151; color: #9ca3af; }
body.dark-mode .ml-group-hdr { background: #374151; border-bottom-color: #4b5563; color: #f3f4f6; }
body.dark-mode .ml-layer-row { border-bottom-color: #374151; color: #d1d5db; }
body.dark-mode .ml-layer-row:hover { background: #374151; }
body.dark-mode .ml-layer-row.active-layer { background: #1e3a5f; border-left-color: #3b82f6; }
body.dark-mode #side-panel { background: #1f2937; border-left-color: #374151; }
body.dark-mode .panel-header { border-bottom-color: #374151; }
body.dark-mode .panel-header h2 { color: #f3f4f6; }
body.dark-mode .panel-meta-field { color: #9ca3af; }
body.dark-mode .cable { border-color: #374151; }
body.dark-mode .cable-hdr { background: #374151; color: #d1d5db; }
body.dark-mode .tube-label { background: #2d3748; border-top-color: #374151; color: #9ca3af; }
body.dark-mode .fiber-row:hover { background: #374151; }
body.dark-mode .fiber-row.selected { background: #1e3a5f; outline-color: #3b82f6; }
body.dark-mode .fiber-name { color: #d1d5db; }
body.dark-mode .section-title { color: #6b7280; }
body.dark-mode .sel-bar { background: #1e3a5f; border-bottom-color: #2563eb; color: #93c5fd; }
body.dark-mode .form-card { background: #111827; border-color: #374151; }
body.dark-mode .form-card label { color: #9ca3af; }
body.dark-mode .form-card input, body.dark-mode .form-card select, body.dark-mode .form-card textarea { background: #1f2937; border-color: #374151; color: #f3f4f6; }
body.dark-mode .add-btn { border-color: #374151; color: #9ca3af; }
body.dark-mode .add-btn:hover { background: #374151; color: #f3f4f6; }
body.dark-mode .modal-bg { background: rgba(0,0,0,.65); }
body.dark-mode .modal { background: #1f2937; color: #f3f4f6; }
body.dark-mode .modal h2 { color: #f3f4f6; }
body.dark-mode .modal label { color: #9ca3af; }
body.dark-mode .modal input, body.dark-mode .modal select, body.dark-mode .modal textarea { background: #111827; border-color: #374151; color: #f3f4f6; }
body.dark-mode .modal .btn-row button { background: #374151; border-color: #4b5563; color: #d1d5db; }
body.dark-mode .splice-list { border-color: #374151; }
body.dark-mode .splice-item { border-bottom-color: #374151; color: #d1d5db; }
body.dark-mode #active-layer-label { background: #2563eb; color: white; }
body.dark-mode #login-screen { background: linear-gradient(135deg, #0d1117 0%, #111827 100%); }
body.dark-mode #login-box { background: #1f2937; }
body.dark-mode #login-box h1 { color: #f3f4f6; }
body.dark-mode #login-box .subtitle { color: #9ca3af; }
body.dark-mode #login-box label { color: #9ca3af; }
body.dark-mode #login-box input { background: #111827; border-color: #374151; color: #f3f4f6; }
body.dark-mode #login-box button { background: #1e3a5f; }
#map-layers-panel { position:fixed;top:0;left:-280px;width:280px;height:100vh;background:white;border-right:1px solid #d0d0d0;box-shadow:3px 0 10px rgba(0,0,0,.12);z-index:2000;display:flex;flex-direction:column;transition:left .22s ease; }
#map-layers-tab { position:absolute;top:50%;right:-26px;transform:translateY(-50%);width:26px;height:54px;background:white;border:1px solid #d0d0d0;border-left:none;border-radius:0 8px 8px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:3px 0 6px rgba(0,0,0,.1);font-size:16px;color:#555;user-select:none; }
#map-layers-tab:hover { background:#f5f5f7; }
.ml-group-hdr { display:flex;align-items:center;gap:6px;padding:7px 10px 7px 8px;background:#f5f5f7;border-bottom:1px solid #eee;font-weight:600;font-size:13px;cursor:default; }
.ml-layer-row { display:flex;align-items:center;gap:6px;padding:5px 10px 5px 24px;border-bottom:1px solid #f5f5f7;font-size:12px;cursor:pointer; }
.ml-layer-row:hover { background:#fafafa; }
.ml-layer-row.active-layer { background:#e3f2fd;border-left:3px solid #1565c0; }
.ml-vis-btn { background:none;border:none;cursor:pointer;font-size:14px;padding:0 2px;opacity:.7; }
.ml-vis-btn:hover { opacity:1; }
.ml-action-btn { background:none;border:none;cursor:pointer;font-size:12px;padding:0 3px;color:#888; }
.ml-action-btn:hover { color:#333; }
#search-wrap { position:relative;display:inline-flex;align-items:center; }
#search-input { padding:5px 10px;font-size:12px;border:1px solid rgba(255,255,255,.35);border-radius:5px;width:200px;outline:none;background:rgba(255,255,255,.15);color:white;transition:width .2s ease,background .15s ease; }
#search-input::placeholder { color:rgba(255,255,255,.6); }
#search-input:focus { width:260px;background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6); }
#search-results { display:none;position:absolute;top:calc(100% + 6px);right:0;width:320px;background:white;border:1px solid #d0d0d0;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:3000;max-height:340px;overflow-y:auto; }
.sr-hdr { font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:6px 12px 3px;background:#f5f5f7; }
.sr-item { padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0; }
.sr-item:last-child { border-bottom:none; }
.sr-item:hover { background:#e3f2fd; }
.sr-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.sr-badge { font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0; }
.sr-badge-pole    { background:#efebe9;color:#5d4037; }
.sr-badge-closure { background:#fff3e0;color:#e65100; }
.sr-badge-addr    { background:#e8f5e9;color:#2e7d32; }
.sr-empty { padding:10px 12px;font-size:12px;color:#888;text-align:center; }
body.dark-mode #search-input { background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25); }
body.dark-mode #search-input:focus { background:rgba(255,255,255,.15); }
body.dark-mode #search-results { background:#1f2937;border-color:#374151; }
body.dark-mode .sr-hdr { background:#374151;color:#9ca3af; }
body.dark-mode .sr-item { border-bottom-color:#374151;color:#d1d5db; }
body.dark-mode .sr-item:hover { background:#1e3a5f; }
body.dark-mode .sr-empty { color:#6b7280; }
.import-progress-wrap { background:#e5e7eb; border-radius:4px; height:8px; margin:12px 0 4px; overflow:hidden; }
.import-progress-bar  { background:#1565c0; height:100%; width:0; transition:width .2s; }
.import-assign-row    { display:flex; align-items:center; gap:12px; margin:6px 0; font-size:13px; }
.import-assign-row label { display:flex; align-items:center; gap:4px; cursor:pointer; }
body.dark-mode .import-progress-wrap { background:#374151; }
</style>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

<body>
<script>if(localStorage.getItem('ofm-dark-mode')==='true')document.body.classList.add('dark-mode');</script>

<!-- Login Screen -->
<div id="login-screen">
  <div id="login-box">
    <h1>Open Fiber Map</h1>
    <p class="subtitle">Fiber Network Management</p>
    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" required autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit">Sign In</button>
      <div id="login-error"></div>
    </form>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div id="topbar">
    <h1>Open Fiber Map</h1>
    <span style="opacity: 0.6;">Fiber Network</span>
    <div class="spacer"></div>
    <div id="search-wrap">
      <input type="text" id="search-input" placeholder="🔍 Search address, pole, closure…"
        autocomplete="off"
        oninput="onSearchInput()"
        onkeydown="onSearchKeydown(event)"
        onfocus="if(this.value.trim().length>=2)renderSearchResults()">
      <div id="search-results"></div>
    </div>
    <span class="user-info" id="user-info"></span>
    <button id="admin-btn" style="display:none;" onclick="window.location.href='/admin'">Admin</button>
    <button onclick="logout()">Sign Out</button>
  </div>
  <div id="toolbar">
    <button class="tb active" id="btn-select" onclick="setMode('select')">Select</button>
    <button class="tb" id="btn-closure" onclick="setMode('closure')">+ Closure</button>
    <button class="tb" id="btn-route" onclick="setMode('route')">+ Fiber</button>
    <button class="tb" id="btn-pole" onclick="setMode('pole')">+ Pole</button>
    <button class="tb" id="btn-site" onclick="pickSiteType()">+ Site</button>
    <button class="tb" id="btn-delete" onclick="setMode('delete')" style="color:#c62828;">Delete Area</button>
    <button class="tb" id="btn-edit" onclick="setMode('edit')" style="color:#1565c0;">✏ Edit</button>
    <button class="tb" id="btn-views" onclick="toggleViewsPanel()">🗂 Views</button>
    <button class="tb" onclick="document.getElementById('kml-import-input').click()">📥 Import</button>
    <input type="file" id="kml-import-input" accept=".kml,.kmz" style="display:none" onchange="onImportFileChosen(this)">
    <button class="tb" onclick="exportKMZ()">📤 Export KMZ</button>
    <span id="active-layer-label" style="display:none;font-size:11px;padding:3px 8px;background:#1565c0;color:white;border-radius:4px;">Layer: —</span>
    <span id="mode-hint">Click a closure to view splices</span>
  </div>
  <div id="views-panel" style="display:none;position:absolute;top:44px;left:auto;z-index:1000;background:white;border:1px solid #d0d0d0;border-radius:6px;padding:10px 14px;min-width:180px;box-shadow:0 2px 8px rgba(0,0,0,.18);">
    <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Basemap</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button id="lp-street" class="tb" onclick="setBasemap('street')">Street</button>
      <button id="lp-sat" class="tb" onclick="setBasemap('sat')">Satellite</button>
    </div>
    <div id="lp-overlays">
      <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Overlays</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px;cursor:pointer;">
        <input type="checkbox" id="lp-labels" onchange="setOverlay('labels',this.checked)"> Place names
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="lp-roads" onchange="setOverlay('roads',this.checked)"> Streets
      </label>
    </div>
    <div style="border-top:1px solid #e0e0e0;margin-top:8px;padding-top:8px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="lp-dark" onchange="setDarkMode(this.checked)"> Dark mode
      </label>
    </div>
  </div>
  <div id="map-layers-panel">
    <div id="map-layers-tab" onclick="toggleMapLayersPanel()">›</div>
    <div style="padding:10px 12px;border-bottom:1px solid #e0e0e0;background:#f8f8fa;flex-shrink:0;">
      <span style="font-weight:600;font-size:14px;">Layers</span>
    </div>
    <div id="map-layers-body" style="flex:1;overflow-y:auto;padding:6px 0;"></div>

function h(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function closestPointOnSegmentPx(A, B, P) {
  const dx = B.x - A.x, dy = B.y - A.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { point: A, t: 0 };
  const t = Math.max(0, Math.min(1, ((P.x - A.x) * dx + (P.y - A.y) * dy) / lenSq));
  return { point: L.point(A.x + t * dx, A.y + t * dy), t };
}

async function api(method, path, body) {
  const opts = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (r.status === 401) {

    throw new Error('Not authenticated');
  }
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: 'Server error' }));
    throw new Error(err.error || 'Request failed');
  }
  return r.json();
}

let lastClickTime = 0;
let lastClickLatLng = null;

function onMapClick(e) {
  if (state.mode === 'edit') { clearEditHandles(); return; }
  if (state.mode === 'select' && state.selectedClosure) closePanel();
  if (state.mode === 'delete') return;
  if (state.mode === 'closure') {
    let placeLatlng = e.latlng;
    let snappedRouteId = null;
    if (state.snapPoleId) {
      const p = state.poles.find(p => p.id === state.snapPoleId);
      if (p) { const [lng, lat] = p.geom.coordinates; placeLatlng = L.latLng(lat, lng); }
    } else if (state.snapRouteId) {
      placeLatlng = L.latLng(state.snapRoutePoint.lat, state.snapRoutePoint.lng);
      snappedRouteId = state.snapRouteId;
    }
    const snappedPoleId = state.snapPoleId || null;
    clearSnap();
    promptCreateClosure(placeLatlng, snappedRouteId, snappedPoleId);
  } else if (state.mode === 'pole') {
    promptCreatePole(e.latlng);
  } else if (state.mode === 'site') {
    promptCreateSite(e.latlng, state.pendingSiteType);
  } else if (state.mode === 'route') {
    const now = Date.now();
    // Double-click detection: same area, within 350ms = finish fiber
    if (lastClickLatLng && (now - lastClickTime) < 350 &&
        Math.abs(lastClickLatLng.lat - e.latlng.lat) < 0.0001 &&
        Math.abs(lastClickLatLng.lng - e.latlng.lng) < 0.0001) {
      if (state.routePoints.length >= 2) {
        // Apply terminal snap to the last recorded point if one is active
        if (state.snapClosureId) {
          const cl = state.closures.find(c => c.id === state.snapClosureId);
          if (cl) {
            const [lng, lat] = cl.geom.coordinates;
            const last = state.routePoints.length - 1;
            state.routePoints[last] = [lat, lng];
            state.routeSnapClosures[last] = cl.id;
            // closure on a pole → implicitly attach that pole too
            if (cl.pole_id && !state.drawAttachedPoles.includes(cl.pole_id)) {
              state.drawAttachedPoles.push(cl.pole_id);
            }
          }
        } else if (state.snapPoleId) {
          const pole = state.poles.find(p => p.id === state.snapPoleId);
          if (pole) {
            const [lng, lat] = pole.geom.coordinates;
            const last = state.routePoints.length - 1;
            state.routePoints[last] = [lat, lng];
            if (!state.drawAttachedPoles.includes(pole.id)) state.drawAttachedPoles.push(pole.id);
          }
        } else if (state.snapSiteId) {
          const s = state.sites.find(s => s.id === state.snapSiteId);
          if (s) {
            const [lng, lat] = s.geom.coordinates;
            const last = state.routePoints.length - 1;
            state.routePoints[last] = [lat, lng];
            state.routeSnapSites[last] = s.id;
          }
        }
        const points = [...state.routePoints];
        const snapsCopy = [...state.routeSnapClosures];
        const sitesCopy = [...state.routeSnapSites];
        const tempLine = state.routeLine;
        state.routePoints = [];
        state.routeSnapClosures = [];
        state.routeSnapSites = [];
        state.routeLine = null;
        lastClickTime = 0;
        lastClickLatLng = null;
        promptCreateRoute(points, tempLine, snapsCopy, sitesCopy);
      }
      return;
    }
    // Normal click - snap to closure (first point only), pole, or site, then add point
    lastClickTime = now;
    let clickLatLng = e.latlng;
    let closureSnappedId = null;
    let siteSnappedId = null;
    const isFirstPoint = (state.routePoints.length === 0);

    if (state.snapClosureId && isFirstPoint) {
      const cl = state.closures.find(c => c.id === state.snapClosureId);
      if (cl) {
        const [lng, lat] = cl.geom.coordinates;
        clickLatLng = L.latLng(lat, lng);
        closureSnappedId = cl.id;
        // closure on a pole → implicitly attach that pole too
        if (cl.pole_id && !state.drawAttachedPoles.includes(cl.pole_id)) {
          state.drawAttachedPoles.push(cl.pole_id);
        }
      }
    } else if (state.snapPoleId) {
      const pole = state.poles.find(p => p.id === state.snapPoleId);
      if (pole) {
        const [lng, lat] = pole.geom.coordinates;
        clickLatLng = L.latLng(lat, lng);
        if (!state.drawAttachedPoles.includes(pole.id)) state.drawAttachedPoles.push(pole.id);
      }
    } else if (state.snapSiteId) {
      const s = state.sites.find(s => s.id === state.snapSiteId);
      if (s) {
        const [lng, lat] = s.geom.coordinates;
        clickLatLng = L.latLng(lat, lng);
        siteSnappedId = s.id;
      }
    }

    lastClickLatLng = clickLatLng;
    state.routePoints.push([clickLatLng.lat, clickLatLng.lng]);
    state.routeSnapClosures.push(closureSnappedId); // parallel to routePoints
    state.routeSnapSites.push(siteSnappedId);       // parallel to routePoints
    if (state.routeLine) map.removeLayer(state.routeLine);
    state.routeLine = L.polyline(state.routePoints, { color: '#FF8800', weight: 3.5, opacity: 0.85 }).addTo(map);
  }
}

function _interpAddressPoints(geometry, startNum, endNum, interpType) {
  if (interpType === 'alphabetic') return [];
  const s = parseInt(startNum), e = parseInt(endNum);
  if (isNaN(s) || isNaN(e) || s === e) return [];
  const step = (interpType === 'all') ? 1 : 2;
  const lo = Math.min(s, e), hi = Math.max(s, e);
  const count = Math.floor((hi - lo) / step) + 1;
  if (count <= 2 || count > 500) return [];
  // cumulative distance along geometry
  const cum = [0];
  for (let i = 1; i < geometry.length; i++) {
    const a = geometry[i - 1], b = geometry[i];
    cum.push(cum[i - 1] + Math.hypot(b.lat - a.lat, b.lon - a.lon));
  }
  const total = cum[cum.length - 1];
  if (total === 0) return [];
  const results = [];
  // skip index 0 and count-1 — those are the endpoint nodes shown separately
  for (let i = 1; i < count - 1; i++) {
    const num = s + i * step * (e > s ? 1 : -1);
    const frac = i / (count - 1);
    const target = frac * total;
    let si = geometry.length - 2;
    for (let j = 0; j < cum.length - 1; j++) { if (cum[j + 1] >= target) { si = j; break; } }
    const sf = (cum[si + 1] - cum[si]) > 0 ? (target - cum[si]) / (cum[si + 1] - cum[si]) : 0;
    const a = geometry[si], b = geometry[si + 1];
    results.push({ lat: a.lat + sf * (b.lat - a.lat), lon: a.lon + sf * (b.lon - a.lon), num: String(Math.abs(num)) });
  }
  return results;
}

async function fetchHouseNums() {
  _houseNumTimer = null;
  if (!layerPrefs.showHouseNums) { clearHouseNums(); return; }
  if (map.getZoom() < 15) {
    clearHouseNums();
    const hnEl = document.getElementById('lp-housenums-hint');
    if (hnEl) hnEl.style.display = '';
    return;
  }
  const hnHint = document.getElementById('lp-housenums-hint');
  if (hnHint) hnHint.style.display = 'none';
  const b = map.getBounds();
  const bbox = `${b.getSouth().toFixed(6)},${b.getWest().toFixed(6)},${b.getNorth().toFixed(6)},${b.getEast().toFixed(6)}`;
  // Query individual address nodes/ways AND interpolation ways (with full geometry) plus their endpoint nodes
  const q = `[out:json][timeout:20];
(node["addr:housenumber"](${bbox});way["addr:housenumber"](${bbox});way["addr:interpolation"](${bbox});)->.main;
node(w.main)["addr:housenumber"]->.endnodes;
(.main;.endnodes;);
out geom;`;
  try {
    const resp = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(q)
    });
    if (!resp.ok) return;
    const data = await resp.json();
    clearHouseNums();
    if (!layerPrefs.showHouseNums) return;

    // Build node lookup for interpolation endpoint house numbers
    const nodeById = {};
    data.elements.forEach(el => {
      if (el.type === 'node' && el.tags?.['addr:housenumber']) {
        nodeById[el.id] = { lat: el.lat, lon: el.lon, num: el.tags['addr:housenumber'] };
      }
    });

    const seenNodes = new Set();
    data.elements.forEach(el => {
      if (el.type === 'node' && el.tags?.['addr:housenumber']) {
        if (!seenNodes.has(el.id)) { seenNodes.add(el.id); _addHouseNumLabel(el.lat, el.lon, el.tags['addr:housenumber']); }
      } else if (el.type === 'way' && el.tags?.['addr:housenumber'] && el.geometry?.length) {
        // Building way — use centroid
        const lat = el.geometry.reduce((s, n) => s + n.lat, 0) / el.geometry.length;
        const lon = el.geometry.reduce((s, n) => s + n.lon, 0) / el.geometry.length;
        _addHouseNumLabel(lat, lon, el.tags['addr:housenumber']);
      } else if (el.type === 'way' && el.tags?.['addr:interpolation'] && el.nodes?.length && el.geometry?.length) {
        // Interpolation way — compute individual house positions
        const start = nodeById[el.nodes[0]], end = nodeById[el.nodes[el.nodes.length - 1]];
        if (!start || !end) return;
        const pts = _interpAddressPoints(el.geometry, start.num, end.num, el.tags['addr:interpolation']);
        pts.forEach(pt => _addHouseNumLabel(pt.lat, pt.lon, pt.num));
      }
    });
  } catch (_) {}
}

function clearEditSnap() {
  state.editSnapPoleId = null;
  if (state.editSnapLayer) { map.removeLayer(state.editSnapLayer); state.editSnapLayer = null; }
}

function checkEditSnap(latlng) {
  const SNAP_PX = 20;
  let closestPole = null, closestDist = Infinity;
  const mapPt = map.latLngToContainerPoint(latlng);
  state.poles.forEach(p => {
    const [pLng, pLat] = p.geom.coordinates;
    const pPt = map.latLngToContainerPoint([pLat, pLng]);
    const dist = Math.hypot(mapPt.x - pPt.x, mapPt.y - pPt.y);
    if (dist < SNAP_PX && dist < closestDist) { closestPole = p; closestDist = dist; }
  });
  if (closestPole) {
    if (state.editSnapPoleId !== closestPole.id) {
      clearEditSnap();
      state.editSnapPoleId = closestPole.id;
      const [pLng, pLat] = closestPole.geom.coordinates;
      state.editSnapLayer = L.circleMarker([pLat, pLng], { radius: 11, color: '#1565c0', weight: 2.5, fill: false, opacity: 0.9 }).addTo(map);
    }
  } else {
    clearEditSnap();
  }
}

function clearEditHandles() {
  state.editHandles.forEach(h => map.removeLayer(h));
  state.editHandles = [];
  state.editVertexPoints = [];
  state.editingRouteId = null;
  clearEditSnap();
}

function startEditRoute(routeId) {
  clearEditHandles();
  if (state.mode !== 'edit') return;
  state.editingRouteId = routeId;
  const route = state.routes.find(r => r.id === routeId);
  if (!route) return;
  state.editVertexPoints = route.geom.coordinates.map(c => [c[1], c[0]]); // store as [lat, lng]
  state.editVertexPoints.forEach((pt, i) => {
    const handleIcon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;background:white;border:2px solid #1565c0;border-radius:50%;cursor:move;"></div>',
      iconSize: [10, 10], iconAnchor: [5, 5]
    });
    const handle = L.marker(pt, { icon: handleIcon, draggable: true, zIndexOffset: 500 }).addTo(map);
    handle.on('drag', (e) => {
      state.editVertexPoints[i] = [e.latlng.lat, e.latlng.lng];
      const routeLine = state.routeLayers[routeId];
      if (routeLine) routeLine.setLatLngs(state.editVertexPoints);
      checkEditSnap(e.latlng);
    });
    handle.on('dragend', async () => {
      if (state.editSnapPoleId) {
        const pole = state.poles.find(p => p.id === state.editSnapPoleId);
        if (pole) {
          const [pLng, pLat] = pole.geom.coordinates;
          handle.setLatLng([pLat, pLng]);
          state.editVertexPoints[i] = [pLat, pLng];
          const routeLine = state.routeLayers[routeId];
          if (routeLine) routeLine.setLatLngs(state.editVertexPoints);
        }
        clearEditSnap();
      }
      const points = state.editVertexPoints.map(pt => [pt[1], pt[0]]); // [lng, lat] for WKT
      const route = state.routes.find(r => r.id === routeId);
      if (route) {
        try {
          await api('PUT', '/routes/' + routeId, { name: route.name, notes: route.notes, fiber_count: route.fiber_count, color: route.color, attached_poles: route.attached_poles, points });
          route.geom.coordinates = points;
        } catch (err) { alert('Failed to save route position'); }
      }
    });
    state.editHandles.push(handle);
  });
}

function updatePreview(e) {
  if (!state.routePoints.length) { clearPreview(); return; }
  let targetLatLng = e.latlng;
  if (state.snapClosureId) {
    const cl = state.closures.find(c => c.id === state.snapClosureId);
    if (cl) { const [lng, lat] = cl.geom.coordinates; targetLatLng = L.latLng(lat, lng); }
  } else if (state.snapPoleId) {
    const pole = state.poles.find(p => p.id === state.snapPoleId);
    if (pole) { const [lng, lat] = pole.geom.coordinates; targetLatLng = L.latLng(lat, lng); }
  } else if (state.snapSiteId) {
    const s = state.sites.find(s => s.id === state.snapSiteId);
    if (s) { const [lng, lat] = s.geom.coordinates; targetLatLng = L.latLng(lat, lng); }
  }
  const last = state.routePoints[state.routePoints.length - 1];
  const coords = [last, targetLatLng];
  if (state.previewLine) {
    state.previewLine.setLatLngs(coords);
  } else {
    state.previewLine = L.polyline(coords, { color: '#FF8800', weight: 2.5, opacity: 0.55, dashArray: '7,5' }).addTo(map);
  }
}

function onMapMouseMove(e) {
  if (state.mode === 'delete') {
    if (state.dragStart) {
      const bounds = L.latLngBounds(state.dragStart, e.latlng);
      if (state.selectRect) {
        state.selectRect.setBounds(bounds);
      } else {
        state.selectRect = L.rectangle(bounds, {
          color: '#e53935', weight: 2, fillColor: '#e53935', fillOpacity: 0.08, dashArray: '6,4'
        }).addTo(map);
      }
    }
    return;
  }
  if (state.mode !== 'route' && state.mode !== 'closure') { clearSnap(); return; }
  const SNAP_PX = 20;
  const cursorPx = map.latLngToContainerPoint(e.latlng);

  if (state.mode === 'closure') {
    // Pole snap takes priority
    let closestPole = null, closestPoleDist = Infinity;
    state.poles.forEach(p => {
      const [lng, lat] = p.geom.coordinates;
      const dist = map.latLngToContainerPoint([lat, lng]).distanceTo(cursorPx);
      if (dist < SNAP_PX && dist < closestPoleDist) { closestPole = p; closestPoleDist = dist; }
    });
    if (closestPole) {
      if (state.snapPoleId !== closestPole.id) {
        clearSnap();
        const [lng, lat] = closestPole.geom.coordinates;
        state.snapPoleId = closestPole.id;
        state.snapLayer = L.circleMarker([lat, lng], { radius: 11, color: '#1565c0', weight: 2.5, fill: false, opacity: 0.9 }).addTo(map);
      }
      return;
    }

    // Route snap (only when no pole nearby)
    let bestRoute = null, bestDist = Infinity, bestLat = 0, bestLng = 0;
    state.routes.forEach(r => {
      const coords = r.geom.coordinates; // [lng, lat] pairs
      for (let i = 0; i < coords.length - 1; i++) {
        const A = map.latLngToContainerPoint([coords[i][1],   coords[i][0]]);
        const B = map.latLngToContainerPoint([coords[i+1][1], coords[i+1][0]]);
        const { point, t } = closestPointOnSegmentPx(A, B, cursorPx);
        const dist = cursorPx.distanceTo(point);
        if (dist < SNAP_PX && dist < bestDist) {
          bestDist = dist;
          bestRoute = r;
          bestLat = coords[i][1] + t * (coords[i+1][1] - coords[i][1]);
          bestLng = coords[i][0] + t * (coords[i+1][0] - coords[i][0]);
        }
      }
    });
    if (bestRoute) {
      const changed = state.snapRouteId !== bestRoute.id ||
        Math.abs((state.snapRoutePoint?.lat ?? 0) - bestLat) > 0.000001;
      if (changed) {
        clearSnap();
        state.snapRouteId = bestRoute.id;
        state.snapRoutePoint = { lat: bestLat, lng: bestLng };
        state.snapLayer = L.circleMarker([bestLat, bestLng], { radius: 11, color: '#1565c0', weight: 2.5, fill: false, opacity: 0.9 }).addTo(map);
      }
    } else {
      clearSnap();
    }
    return;
  }

  // Route mode: closure snap takes priority over pole snap
  let closestClosure = null, closestClosureDist = Infinity;
  state.closures.forEach(c => {
    const [lng, lat] = c.geom.coordinates;
    const dist = map.latLngToContainerPoint([lat, lng]).distanceTo(cursorPx);
    if (dist < SNAP_PX && dist < closestClosureDist) { closestClosure = c; closestClosureDist = dist; }
  });
  if (closestClosure) {
    if (state.snapClosureId !== closestClosure.id) {
      clearSnap();
      const [lng, lat] = closestClosure.geom.coordinates;
      state.snapClosureId = closestClosure.id;
      state.snapLayer = L.circleMarker([lat, lng], { radius: 13, color: '#E65100', weight: 2.5, dashArray: '5,4', fill: false, opacity: 0.9 }).addTo(map);
    }
    updatePreview(e);
    return;
  }

  // Pole snap (only when no closure nearby)
  let closestPole = null, closestPoleDist = Infinity;
  state.poles.forEach(p => {
    const [lng, lat] = p.geom.coordinates;
    const dist = map.latLngToContainerPoint([lat, lng]).distanceTo(cursorPx);
    if (dist < SNAP_PX && dist < closestPoleDist) { closestPole = p; closestPoleDist = dist; }
  });
  if (closestPole) {
    if (state.snapPoleId !== closestPole.id) {
      clearSnap();
      const [lng, lat] = closestPole.geom.coordinates;
      state.snapPoleId = closestPole.id;
      state.snapLayer = L.circleMarker([lat, lng], { radius: 11, color: '#1565c0', weight: 2.5, fill: false, opacity: 0.9 }).addTo(map);
    }
    updatePreview(e);
    return;
  }

  // Site snap (lowest priority — only when no closure or pole nearby)
  let closestSite = null, closestSiteDist = Infinity;
  state.sites.forEach(s => {
    const [lng, lat] = s.geom.coordinates;
    const dist = map.latLngToContainerPoint([lat, lng]).distanceTo(cursorPx);
    if (dist < SNAP_PX && dist < closestSiteDist) { closestSite = s; closestSiteDist = dist; }
  });
  if (closestSite) {
    if (state.snapSiteId !== closestSite.id) {
      clearSnap();
      const [lng, lat] = closestSite.geom.coordinates;
      state.snapSiteId = closestSite.id;
      state.snapLayer = L.circleMarker([lat, lng], { radius: 16, color: '#6a1b9a', weight: 2.5, fill: false, opacity: 0.9 }).addTo(map);
    }
  } else {
    clearSnap();
  }
  updatePreview(e);
}

const _PLACEMENT_TYPES = { closure: 'closure', route: 'route', pole: 'pole', site: 'site' };

function getActiveLayer() {
  if (state.activeLayerId === null) return null;
  for (const g of state.layerGroups) {
    const l = (g.layers || []).find(l => l.id === state.activeLayerId);
    if (l) return l;
  }
  return null;
}

function setActiveLayer(id) {
  state.activeLayerId = (state.activeLayerId === id) ? null : id;
  updateActiveLayerLabel();
  updateToolbarRestrictions();
  renderLayersPanel();
}

function updateActiveLayerLabel() {
  const el = document.getElementById('active-layer-label');
  if (!el) return;
  const layer = getActiveLayer();
  if (layer) {
    el.textContent = 'Layer: ' + layer.name;
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

function updateToolbarRestrictions() {
  const BTN_TYPES = { 'btn-closure': 'closure', 'btn-route': 'route', 'btn-pole': 'pole', 'btn-site': 'site' };
  const activeLayer = getActiveLayer();
  for (const [btnId, type] of Object.entries(BTN_TYPES)) {
    const blocked = activeLayer?.allowed_types?.length > 0 && !activeLayer.allowed_types.includes(type);
    document.getElementById(btnId)?.classList.toggle('layer-blocked', !!blocked);
  }
}

  el.style.color = '#c62828';
  el.textContent = `Layer "${layerName}" only allows: ${getActiveLayer().allowed_types.join(', ')}`;
  setTimeout(() => { el.style.color = ''; el.textContent = prev; }, 2500);
}

// ============ SEARCH ============
function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  if (_searchTimer) clearTimeout(_searchTimer);
  if (_searchAbort) { _searchAbort.abort(); _searchAbort = null; }
  if (q.length < 2) { _geoResults = []; hideSearchResults(); return; }
  renderSearchResults(q);
  _searchTimer = setTimeout(() => fetchGeoSearch(q), 200);
}

function onSearchKeydown(e) {
  if (e.key === 'Escape') { hideSearchResults(); e.target.value = ''; e.target.blur(); }
}

function renderSearchResults(q) {
  q = q != null ? q : document.getElementById('search-input').value.trim();
  if (q.length < 2) { hideSearchResults(); return; }
  const lq = q.toLowerCase();
  const poles    = state.poles.filter(p => p.name.toLowerCase().includes(lq)).slice(0, 6);
  const closures = state.closures.filter(c => c.name.toLowerCase().includes(lq)).slice(0, 6);
  let html = '';
  if (poles.length) {
    html += '<div class="sr-hdr">Poles</div>';
    poles.forEach(p => {
      html += `<div class="sr-item" onclick="pickSearchResult('pole',${p.id})"><span class="sr-badge sr-badge-pole">Pole</span><span class="sr-name">${h(p.name)}</span></div>`;
    });
  }
  if (closures.length) {
    html += '<div class="sr-hdr">Closures</div>';
    closures.forEach(c => {
      html += `<div class="sr-item" onclick="pickSearchResult('closure',${c.id})"><span class="sr-badge sr-badge-closure">Closure</span><span class="sr-name">${h(c.name)}</span></div>`;
    });
  }
  if (_geoResults.length) {
    let nearbyShown = false, otherShown = false;
    _geoResults.forEach((r, i) => {
      if ( r._isLocal && !nearbyShown) { html += '<div class="sr-hdr">Nearby</div>';          nearbyShown = true; }
      if (!r._isLocal && !otherShown)  { html += '<div class="sr-hdr">Other locations</div>'; otherShown  = true; }
      const label = r.display_name.split(',').slice(0, 3).join(', ');
      html += `<div class="sr-item" onclick="pickSearchResult('addr',${i})"><span class="sr-badge sr-badge-addr">Address</span><span class="sr-name">${h(label)}</span></div>`;
    });
  }
  if (!html) html = '<div class="sr-empty">No results</div>';
  const el = document.getElementById('search-results');
  el.innerHTML = html;
  el.style.display = 'block';
}

function geoCountryCode(lat, lng) {
  if (lat >= 24 && lat <= 50 && lng >= -125 && lng <= -66) return 'us';
  if (lat >= 42 && lat <= 84 && lng >= -141 && lng <= -52) return 'ca';
  if (lat >= 50 && lat <= 62 && lng >= -11 && lng <=   2) return 'gb,ie';
  return '';
}

// Reverse-geocode map center to get the current state/province bounding box.
// Called on moveend (debounced) so search stays pinned to the current admin area.
function scheduleGeoContext() {
  if (_geoCtxTimer) clearTimeout(_geoCtxTimer);
  _geoCtxTimer = setTimeout(refreshGeoContext, 2500);
}

async function refreshGeoContext() {
  const center = map.getCenter();
  const mapZoom = map.getZoom();
  const cc = geoCountryCode(center.lat, center.lng);

  // Pick Nominatim reverse-geocode zoom based on how closely the user is viewing:
  //   map zoom 14+ → city/town (revZoom 10)
  //   map zoom 10–13 → county   (revZoom  8)
  //   map zoom  7–9  → state    (revZoom  5)
  //   map zoom  < 7  → country only, no bounded restriction
  let revZoom;
  if      (mapZoom >= 14) revZoom = 10;
  else if (mapZoom >= 10) revZoom = 8;
  else if (mapZoom >=  7) revZoom = 5;
  else                  { _geoContext = { vb: null, cc }; return; }

  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${center.lat.toFixed(4)}&lon=${center.lng.toFixed(4)}&zoom=${revZoom}&format=json`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await r.json();
    if (data.boundingbox) {
      const [s, n, w, e] = data.boundingbox;
      _geoContext = { vb: `${w},${n},${e},${s}`, cc };
    } else {
      _geoContext = { vb: null, cc };
    }
  } catch (_) {
    _geoContext = { vb: null, cc };
  }
}

async function fetchGeoSearch(q) {
  if (_searchAbort) _searchAbort.abort();
  _searchAbort = new AbortController();
  const sig = _searchAbort.signal;

  const center = map.getCenter();
  const opts = { signal: sig, headers: { 'Accept-Language': 'en' } };

  // Use the state bounding box if we have it; otherwise fall back to a 4× viewport expansion
  let vb, bounded;
  if (_geoContext?.vb) {
    vb      = _geoContext.vb;
    bounded = '&bounded=1';
  } else {
    const b = map.getBounds();
    const latSpan = (b.getNorth() - b.getSouth()) * 2;
    const lngSpan = (b.getEast()  - b.getWest())  * 2;
    vb      = `${(center.lng - lngSpan).toFixed(4)},${(center.lat + latSpan).toFixed(4)},${(center.lng + lngSpan).toFixed(4)},${(center.lat - latSpan).toFixed(4)}`;
    bounded = '';
  }

  const cc = _geoContext?.cc ?? geoCountryCode(center.lat, center.lng);
  let url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=8&viewbox=${vb}${bounded}&addressdetails=0`;
  if (cc) url += `&countrycodes=${cc}`;

  try {
    const resp = await fetch(url, opts);
    if (sig.aborted) return;
    const results = resp.ok ? await resp.json() : [];
    if (sig.aborted) return;

    // Sort by distance; mark as local if within the current viewport (not the full state bbox)
    const b = map.getBounds();
    results.forEach(r => {
      const rlat = parseFloat(r.lat), rlon = parseFloat(r.lon);
      r._dist    = Math.hypot(rlat - center.lat, rlon - center.lng);
      r._isLocal = b.contains([rlat, rlon]);
    });
    results.sort((a, b) => a._dist - b._dist);

    _geoResults = results;
    renderSearchResults();
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('geo search error', e);
  }
}

function pickSearchResult(type, idx) {
  const geoResult = type === 'addr' ? _geoResults[idx] : null;
  hideSearchResults();
  document.getElementById('search-input').value = '';
  if (type === 'pole') {
    const p = state.poles.find(x => x.id === idx);
    if (!p) return;
    const [lng, lat] = p.geom.coordinates;
    map.setView([lat, lng], 18);
    handlePoleClick(idx);
  } else if (type === 'closure') {
    const c = state.closures.find(x => x.id === idx);
    if (!c) return;
    const [lng, lat] = c.geom.coordinates;
    map.setView([lat, lng], 18);
    openClosurePanel(idx);
  } else if (type === 'addr') {
    if (!geoResult) return;
    if (geoResult.boundingbox) {
      const [s, n, w, e] = geoResult.boundingbox.map(parseFloat);
      map.fitBounds([[s, w], [n, e]], { maxZoom: 17 });
    } else {
      map.flyTo([parseFloat(geoResult.lat), parseFloat(geoResult.lon)], 17);
    }
  }
}

function hideSearchResults() {
  const el = document.getElementById('search-results');
  if (el) el.style.display = 'none';
  _geoResults = [];
}

// ============ KML / KMZ IMPORT ============
async function onImportFileChosen(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  let kmlText;
  _importZip = null;
  try {
    if (file.name.toLowerCase().endsWith('.kmz')) {
      const zip = await JSZip.loadAsync(file);
      const entry = Object.keys(zip.files).find(n => n.toLowerCase().endsWith('.kml'));
      if (!entry) throw new Error('No .kml found inside KMZ');
      kmlText = await zip.files[entry].async('text');
      _importZip = zip;
    } else {
      kmlText = await file.text();
    }
  } catch (e) { alert('Could not read file: ' + e.message); return; }
  const zipImageFiles = _importZip
    ? Object.keys(_importZip.files).filter(n => /\.(jpg|jpeg|png|gif|webp)$/i.test(n))
    : [];
  console.log('[KMZ import] image files in ZIP:', zipImageFiles);
  const parsed = parseKMLFeatures(kmlText, zipImageFiles);
  console.log('[KMZ import] points with photoSrc:', parsed.points.filter(p => p.photoSrc).length, '/', parsed.points.length);
  showImportConfigModal(parsed, file.name);
}

async function exportKMZ() {
  const btn = document.querySelector('button.tb[onclick="exportKMZ()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Exporting…'; }
  try {
    const xe = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const photoDefs = state.fieldDefs.filter(d => d.field_type === 'photo');

    // Fetch field values for all poles and closures in parallel
    const [poleVals, closureVals] = await Promise.all([
      Promise.all(state.poles.map(p =>
        api('GET', `/field-values/pole/${p.id}`).catch(() => [])
      )),
      Promise.all(state.closures.map(c =>
        api('GET', `/field-values/closure/${c.id}`).catch(() => [])
      )),
    ]);

    // Collect photo URLs to embed, keyed by their basename (used as files/ path in KMZ)
    const photoFiles = new Map(); // basename → blob
    async function gatherPhoto(url) {
      if (!url || photoFiles.has(url)) return;
      try {
        const r = await fetch(url, { credentials: 'include' });
        if (r.ok) photoFiles.set(url, await r.blob());
      } catch (e) { /* skip missing photos */ }
    }

    function buildFieldDesc(fieldValues) {
      if (!fieldValues || !fieldValues.length) return '';
      return fieldValues.map(fv => {
        if (!fv.value) return '';
        if (fv.field_type === 'photo') return `<img src="files/${fv.value.split('/').pop()}" width="400"><br>`;
        return `<b>${xe(fv.field_label)}:</b> ${xe(fv.value)}<br>`;
      }).join('');
    }

    function xmlCdata(html) {
      return html ? `<description><![CDATA[${html}]]></description>` : '';
    }

    // Gather all photo blobs first
    const allFvFlat = [...poleVals.flat(), ...closureVals.flat()];
    await Promise.all(allFvFlat.filter(fv => fv.field_type === 'photo' && fv.value).map(fv => gatherPhoto(fv.value)));

    // Build KML
    let polePlacemarks = state.poles.map((p, i) => {
      const coords = Array.isArray(p.geom?.coordinates) ? p.geom.coordinates : [0,0];
      const fvs = poleVals[i] || [];
      const notes = p.notes ? `<b>Notes:</b> ${xe(p.notes)}<br>` : '';
      const fields = buildFieldDesc(fvs);
      return `<Placemark><name>${xe(p.name)}</name><styleUrl>#pole</styleUrl>${xmlCdata(notes + fields)}<Point><coordinates>${coords[0]},${coords[1]},0</coordinates></Point></Placemark>`;
    }).join('\n');

    let closurePlacemarks = state.closures.map((c, i) => {
      const coords = Array.isArray(c.geom?.coordinates) ? c.geom.coordinates : [0,0];
      const fvs = closureVals[i] || [];
      const notes = c.notes ? `<b>Notes:</b> ${xe(c.notes)}<br>` : '';
      const fields = buildFieldDesc(fvs);
      return `<Placemark><name>${xe(c.name)}</name><styleUrl>#closure</styleUrl>${xmlCdata(notes + fields)}<Point><coordinates>${coords[0]},${coords[1]},0</coordinates></Point></Placemark>`;
    }).join('\n');

    let routePlacemarks = state.routes.map(r => {
      const coords = (r.geom?.coordinates || []).map(([lng,lat]) => `${lng},${lat},0`).join(' ');
      const notes = r.notes ? `<b>Notes:</b> ${xe(r.notes)}<br><b>Fibers:</b> ${r.fiber_count}` : `<b>Fibers:</b> ${r.fiber_count}`;
      return `<Placemark><name>${xe(r.name)}</name><styleUrl>#route</styleUrl>${xmlCdata(notes)}<LineString><tessellate>1</tessellate><coordinates>${coords}</coordinates></LineString></Placemark>`;
    }).join('\n');

    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>Open Fiber Map Export</name>
  <Style id="pole"><IconStyle><color>ff0000ff</color><scale>0.8</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style>
  <Style id="closure"><IconStyle><color>ffff5500</color><scale>0.8</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/square.png</href></Icon></IconStyle></Style>
  <Style id="route"><LineStyle><color>ff0088ff</color><width>2</width></LineStyle></Style>
  <Folder><name>Poles</name>${polePlacemarks}</Folder>
  <Folder><name>Closures</name>${closurePlacemarks}</Folder>
  <Folder><name>Fiber Routes</name>${routePlacemarks}</Folder>
</Document>
</kml>`;

    const zip = new JSZip();
    zip.file('doc.kml', kml);
    photoFiles.forEach((blob, url) => {
      zip.file('files/' + url.split('/').pop(), blob);
    });

    const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = 'open-fiber-map-export.kmz';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
  } catch (e) {
    alert('Export failed: ' + e.message);
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📤 Export KMZ'; }
  }
}

function parseKMLFeatures(kmlText, zipImageFiles) {
  const doc = new DOMParser().parseFromString(kmlText, 'text/xml');
  const points = [], lines = [];
  let skippedPolygons = 0;
  const ptExtSet = new Set(), lnExtSet = new Set();
  const imgExt = /\.(jpg|jpeg|png|gif|webp)$/i;

  doc.querySelectorAll('Placemark').forEach(pm => {
    const name = pm.querySelector('name')?.textContent?.trim() || '';
    const desc = pm.querySelector('description')?.textContent?.trim() || '';
    const fields = {};
    pm.querySelectorAll('ExtendedData Data').forEach(d => {
      const k = d.getAttribute('name');
      const v = d.querySelector('value')?.textContent?.trim() || '';
      if (k) fields[k] = v;
    });
    pm.querySelectorAll('SimpleData').forEach(d => {
      const k = d.getAttribute('name');
      const v = d.textContent?.trim() || '';
      if (k) fields[k] = v;
    });

    // Photo detection — 4 strategies in priority order
    let photoSrc = null;
    // 1. <img src> in description HTML — matches both local paths and external URLs
    const imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (imgMatch) photoSrc = imgMatch[1];
    // 2. PhotoOverlay <Icon><href>
    if (!photoSrc) {
      const href = pm.querySelector('Icon href')?.textContent?.trim();
      if (href && imgExt.test(href)) photoSrc = href;
    }
    // 3. ExtendedData / SimpleData field whose value looks like an image path
    if (!photoSrc) {
      for (const v of Object.values(fields)) {
        if (v && imgExt.test(v)) { photoSrc = v; break; }
      }
    }
    // 4. Match by sanitised placemark name to a ZIP image basename
    if (!photoSrc && zipImageFiles && zipImageFiles.length) {
      const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
      const nameSan = norm(name);
      if (nameSan.length) {
        const hit = zipImageFiles.find(f => norm(f.split('/').pop().replace(/\.[^.]+$/, '')) === nameSan);
        if (hit) photoSrc = hit;
      }
    }

    const ptEl = pm.querySelector('Point coordinates');
    if (ptEl) {
      const parts = ptEl.textContent.trim().split(',');
      const lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
      if (!isNaN(lat) && !isNaN(lng)) {
        points.push({ name, desc, fields, lat, lng, photoSrc });
        Object.keys(fields).forEach(k => ptExtSet.add(k));
      }
      return;
    }
    const lsEls = pm.querySelectorAll('LineString coordinates');
    lsEls.forEach(lsEl => {
      const coords = lsEl.textContent.trim().split(/\s+/).map(c => {
        const p = c.split(',');
        return [parseFloat(p[0]), parseFloat(p[1])];
      }).filter(c => !isNaN(c[0]) && !isNaN(c[1]));
      if (coords.length >= 2) {
        lines.push({ name, desc, fields, coords, photoSrc });
        Object.keys(fields).forEach(k => lnExtSet.add(k));
      }
    });
    if (lsEls.length) return;
    if (pm.querySelector('Polygon')) skippedPolygons++;
  });

  // Strategy 5: same number of images as features and none matched yet — assign by order
  if (zipImageFiles && zipImageFiles.length) {
    if (points.every(p => !p.photoSrc) && zipImageFiles.length === points.length) {
      points.forEach((p, i) => { p.photoSrc = zipImageFiles[i]; });
      console.log('[KMZ import] assigned photos by index (count match)');
    } else if (lines.every(l => !l.photoSrc) && zipImageFiles.length === lines.length) {
      lines.forEach((l, i) => { l.photoSrc = zipImageFiles[i]; });
    }
  }

  return { points, lines, skippedPolygons, ptExtFields: [...ptExtSet], lnExtFields: [...lnExtSet] };
}

function stripHTML(str) {
  const d = document.createElement('div');
  d.innerHTML = str;
  return (d.textContent || d.innerText || '').trim();
}

function buildFieldMappingHTML(parsed, scope) {
  // scope: 'pt' for points, 'ln' for lines
  const isPt = scope === 'pt';
  const feats = isPt ? parsed.points : parsed.lines;
  const extFields = isPt ? parsed.ptExtFields : parsed.lnExtFields;
  const hasDesc = feats.some(f => f.desc);
  const fields = ['name', ...(hasDesc ? ['description'] : []), ...extFields];
  if (!fields.length) return '';

  const ptOptDefs = [
    ['feature_name',  'Both names'],
    ['pole_name',     'Pole name'],
    ['closure_name',  'Closure name'],
    ['notes',         'Notes (both)'],
    ['pole_notes',    'Pole notes'],
    ['closure_notes', 'Closure notes'],
    ['fiber_count',   'Fiber count'],
    ['ignore',        'Ignore'],
  ];
  const lnOptDefs = [
    ['feature_name',  'Route name'],
    ['notes',         'Notes'],
    ['fiber_count',   'Fiber count'],
    ['ignore',        'Ignore'],
  ];
  const optDefs = isPt ? ptOptDefs : lnOptDefs;

  const rows = fields.map(f => {
    let def = 'ignore';
    if (f === 'name')        def = 'feature_name';
    if (f === 'description') def = 'notes';
    const fl = f.toLowerCase();
    if (def === 'ignore') {
      if (/fiber|strand|cable|count/.test(fl)) def = 'fiber_count';
      else if (/note|comment/.test(fl))        def = 'notes';
    }
    const opts = optDefs.map(([v, lbl]) =>
      `<option value="${v}"${v === def ? ' selected' : ''}>${lbl}</option>`
    ).join('');
    return `<tr>
      <td style="padding:3px 10px 3px 0;white-space:nowrap;font-size:12px">${h(f)}</td>
      <td><select class="imp-field-map" data-field="${h(f)}" data-scope="${scope}"
          style="width:100%;font-size:12px;padding:2px 4px;border:1px solid #ccc;border-radius:3px">
        ${opts}
      </select></td></tr>`;
  }).join('');

  const label = isPt ? 'Map point fields' : 'Map line fields';
  return `<div style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#555">${label}</div>
    <table style="width:100%;border-collapse:collapse">${rows}</table>
  </div>`;
}

function applyFieldMapping(feat, mapping) {
  const vals = { name: feat.name || '', description: feat.desc || '', ...(feat.fields || {}) };
  let featureName = null, poleName = null, closureName = null;
  let poleNotes = null, closureNotes = null;
  let fiberCount = null;
  for (const [kmlField, target] of Object.entries(mapping)) {
    const raw = (vals[kmlField] || '').trim();
    if (!raw || target === 'ignore') continue;
    const val = kmlField === 'description' ? stripHTML(raw) : raw;
    if      (target === 'feature_name')  { featureName = val; poleName = val; closureName = val; }
    else if (target === 'pole_name')       poleName    = val;
    else if (target === 'closure_name')    closureName = val;
    else if (target === 'notes')         { poleNotes = poleNotes ? poleNotes + '\n' + val : val;
                                           closureNotes = closureNotes ? closureNotes + '\n' + val : val; }
    else if (target === 'pole_notes')      poleNotes    = poleNotes    ? poleNotes    + '\n' + val : val;
    else if (target === 'closure_notes')   closureNotes = closureNotes ? closureNotes + '\n' + val : val;
    else if (target === 'fiber_count')   { const n = parseInt(val); if (!isNaN(n)) fiberCount = n; }
  }
  return { featureName, poleName, closureName, poleNotes, closureNotes, fiberCount };
}

function randomPoleName() {
  return 'P-' + Math.random().toString(36).slice(2, 6).toUpperCase();
}

  _pendingImport = {
    parsed,
    groupName: filename.replace(/\.(kmz|kml)$/i, '') + ' - Imported',
  };
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal" style="width:480px;max-height:85vh;overflow-y:auto" onclick="event.stopPropagation()">
      <div class="modal-body">
        <h3 style="margin:0 0 4px">Import from ${h(filename)}</h3>
        <p style="font-size:12px;color:#888;margin:0 0 14px">Will be saved into a new layer group: <strong>${h(_pendingImport.groupName)}</strong></p>

        ${points.length ? `
        <div style="margin-bottom:12px">
          <strong>📍 ${points.length} point${points.length !== 1 ? 's' : ''}</strong> — import as:
          <div class="import-assign-row" style="flex-wrap:wrap">
            <label><input type="radio" name="pt-type" value="pole" checked> Poles</label>
            <label><input type="radio" name="pt-type" value="closure"> Closures</label>
            <label><input type="radio" name="pt-type" value="pole_closure"> Pole + Closure</label>
            <label><input type="radio" name="pt-type" value="skip"> Skip</label>
          </div>
        </div>` : ''}

        ${lines.length ? `
        <div style="margin-bottom:12px">
          <strong>📏 ${lines.length} line${lines.length !== 1 ? 's' : ''}</strong> — import as:
          <div class="import-assign-row">
            <label><input type="radio" name="ln-type" value="route" checked> Fiber Routes</label>
            <label><input type="radio" name="ln-type" value="skip"> Skip</label>
          </div>
          <div style="display:flex;gap:14px;margin-top:6px;font-size:12px;align-items:center">
            Default fibers: <input type="number" id="imp-fcount" value="12" min="1" max="9999" style="width:60px;padding:3px 6px;border:1px solid #ccc;border-radius:4px">
            Color: <input type="color" id="imp-color" value="#FF8800" style="width:36px;height:24px;border:none;cursor:pointer">

        ${skippedPolygons ? `<p style="font-size:12px;color:#888;margin:4px 0 10px">ℹ ${skippedPolygons} polygon(s) skipped (not supported)</p>` : ''}

        ${(() => {
          const hasPhotos = _importZip && [...points, ...lines].some(f => f.photoSrc);
          if (!hasPhotos) return '';
          const photoDefs = state.fieldDefs.filter(d => d.field_type === 'photo' && (d.entity_type === 'pole' || d.entity_type === 'closure'));
          if (!photoDefs.length) return `<p style="font-size:12px;color:#e65100;margin:0 0 10px;">📷 ${[...points,...lines].filter(f=>f.photoSrc).length} embedded photo(s) found — create a Photo custom field for Pole or Closure in Admin to import them.</p>`;
          const opts = photoDefs.map(d => `<option value="${d.id}">${h(d.field_label)} (${d.entity_type})</option>`).join('');
          return `<div style="margin-bottom:12px;padding:8px 10px;background:#e8f5e9;border-radius:6px;font-size:13px;">
            📷 ${[...points,...lines].filter(f=>f.photoSrc).length} embedded photo(s) found — save to:
            <select id="imp-photo-field" style="margin-left:6px;padding:2px 6px;border:1px solid #ccc;border-radius:4px;">
              <option value="">— skip photos —</option>${opts}
            </select>
          </div>`;
        })()}

        ${points.length ? buildFieldMappingHTML(parsed, 'pt') : ''}
        ${lines.length  ? buildFieldMappingHTML(parsed, 'ln') : ''}

        <div id="imp-progress-wrap" style="display:none">

          <div id="imp-progress-label" style="font-size:12px;color:#555;text-align:center;margin-bottom:6px"></div>
        </div>

        <div class="btn-row" id="imp-btn-row">
