<VirtualHost *:80>
    # SERVER_NAME is replaced by install.sh — remove this line for a catch-all VirtualHost
    ServerName SERVER_NAME

    ProxyPreserveHost On

    # SSE endpoint — must come before /api to disable buffering for real-time events
    ProxyPass /api/events http://localhost:APP_PORT/api/events disablereuse=On flushpackets=on
    ProxyPassReverse /api/events http://localhost:APP_PORT/api/events

    ProxyPass /api http://localhost:APP_PORT/api
    ProxyPassReverse /api http://localhost:APP_PORT/api

    ProxyPass /site http://localhost:APP_PORT/site
    ProxyPassReverse /site http://localhost:APP_PORT/site

    ProxyPass /admin http://localhost:APP_PORT/admin
    ProxyPassReverse /admin http://localhost:APP_PORT/admin

    DocumentRoot INSTALL_DIR/frontend
    <Directory "INSTALL_DIR/frontend">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/open-fiber-map-error.log
    CustomLog ${APACHE_LOG_DIR}/open-fiber-map-access.log combined
</VirtualHost>
